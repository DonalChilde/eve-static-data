  description:
    de: "Die Derelik-Region, Sitz des Ammatar Mandate, wurde im Laufe der Minmatar\
      \ Rebellion zum Schild der Amarr-Flanke. In Derelik kam es zu zahlreichen Auseinandersetzungen\
      \ zwischen den Amarr und den Streitkr\xE4ften der Rebellen, als diese versuchten,\
      \ tiefer in das Territorium ihrer ehemaligen Gebieter einzudringen. Die Stellung\
      \ konnte gehalten werde, nicht zuletzt dank der Kriegsbem\xFChungen der Ammatar,\
      \ und daher belohnten die Amarr die Ammatar mit einer eigenen Provinz. Allerdings\
      \ ist dieser Teil des Alls, der zwischen der Grenze der sich neu formenden Republik\
      \ Minmatar und dem Imperium liegt, eine dunkle, von Feinden umgegebene Insel.\
      \ \n\nWeil es keine sicheren, nach au\xDFerhalb f\xFChrenden Routen gab, war\
      \ das \xDCberleben der lokale Wirtschaft dieser Region im Wesentlichen vom Handel\
      \ mit den Amarr abh\xE4ngig. Die Ammatar hielten mehrere Jahrzehnte wirtschaftlicher\
      \ Stagnation mit einer begrenzten Anzahl von Handelspartner durch. Ihre Entschlossenheit\
      \ wurde in den letzten Jahren mit einem Anstieg des wirtschaftlichen Wohlstands\
      \ belohnt. Dieser harte Werdegang ist der Stolz eines jeden, der sich Ammatar\
      \ nennt und ihr Vertrauen in die Amarr wurde dadurch bis ins Unermessliche gest\xE4\
      rkt."
    en: "The Derelik region, sovereign seat of the Ammatar Mandate, became the shield\
      \ to the Amarrian flank in the wake of the Minmatar Rebellion. Derelik witnessed\
      \ many hostile exchanges between the Amarr and rebel forces as the latter tried\
      \ to push deeper into the territory of their former masters. Having held their\
      \ ground, thanks in no small part to the Ammatars' military efforts, the Amarr\
      \ awarded the Ammatar with their own province. However, this portion of space\
      \ shared borders with the newly forming Minmatar Republic as well as the Empire,\
      \ and thus came to be situated in a dark recess surrounded by hostiles. \n\n\
      Given the lack of safe routes elsewhere, the local economies of this region\
      \ were dependent on trade with the Amarr as their primary means of survival.\
      \ The Ammatar persevered over many decades of economic stagnation and limited\
      \ trade partners, and their determination has in recent decades been rewarded\
      \ with an increase in economic prosperity. This harsh trail is a point of pride\
      \ for all who call themselves Ammatar, and it has bolstered their faith in the\
      \ Amarrian way to no end."
    es: "La regi\xF3n de Derelik, sede soberana del Mandato Ammatar, se convirti\xF3\
      \ en el escudo del flanco amarriano tras la Rebeli\xF3n de Minmatar. Fue testigo\
      \ de muchos intercambios hostiles entre Amarr y las fuerzas rebeldes cuando\
      \ estas \xFAltimas intentaban adentrarse en el territorio de sus antiguos amos.\
      \ Tras haberse mantenido firme, gracias en gran parte a los esfuerzos militares\
      \ de los ammatarianos, Amarr otorg\xF3 a Ammatar su propia provincia. Sin embargo,\
      \ esa parte del espacio compart\xEDa fronteras con la reci\xE9n formada Rep\xFA\
      blica Minmatar y el Imperio, y por tanto se emplazaba en un oscuro reducto rodeado\
      \ de hostiles. \n\nDebido a la falta de rutas seguras hacia el exterior, la\
      \ econom\xEDa local de esta regi\xF3n depend\xEDa del comercio con Amarr como\
      \ principal medio de supervivencia. Ammatar persever\xF3 durante muchas d\xE9\
      cadas de estancamiento econ\xF3mico y socios comerciales limitados, hasta que\
      \ su determinaci\xF3n ha sido recompensada en las \xFAltimas d\xE9cadas con\
      \ un aumento de la prosperidad econ\xF3mica. Ese duro camino es motivo de orgullo\
      \ para quienes se consideran ammatarianos y ha reforzado hasta el infinito su\
      \ fe en el estilo amarriano."
    fr: "Si\xE8ge de la souverainet\xE9 du Mandat ammatar, la r\xE9gion de Derelik\
      \ est devenue le garde-fou du flan amarr face \xE0 la r\xE9bellion minmatar.\
      \ Le secteur a \xE9t\xE9 le th\xE9\xE2tre de nombreuses escarmouches entre les\
      \ Amarr et les forces rebelles d\xE9termin\xE9es \xE0 s'introduire toujours\
      \ plus loin au sein du territoire de leurs anciens ma\xEEtres. Apr\xE8s avoir\
      \ tenu leurs positions gr\xE2ce au soutien militaire ammatar, les Amarr ont\
      \ offert une province autonome \xE0 ces alli\xE9s providentiels. Cependant,\
      \ en raison de ses fronti\xE8res communes avec la R\xE9publique minmatar \xE9\
      mergente d'une part et avec l'Empire d'autre part, ce secteur spatial se trouve\
      \ confin\xE9 dans une enclave cern\xE9e par les forces hostiles. \n\n\xC0 d\xE9\
      faut d'autres voies navigables s\xE9curis\xE9es, l'\xE9conomie locale est devenue\
      \ enti\xE8rement d\xE9pendante du n\xE9goce avec les Amarr. En butte \xE0 une\
      \ stagnation \xE9conomique et \xE0 des partenariats commerciaux tr\xE8s limit\xE9\
      s, les Ammatar ont malgr\xE9 tout pers\xE9v\xE9r\xE9 pendant des d\xE9cennies,\
      \ et leur d\xE9termination a fini par s'av\xE9rer payante. Aujourd'hui, l'\xE9\
      conomie r\xE9gionale est florissante. Motif de fiert\xE9 pour tous les Ammatar,\
      \ ce chemin de croix finalement couronn\xE9 de succ\xE8s a galvanis\xE9 leur\
      \ foi en l'id\xE9ologie amarr."
    ja: "\u30A2\u30DE\u30BF\u30FC\u30DE\u30F3\u30C7\u30FC\u30C8\u306E\u7D71\u6CBB\u4E0B\
