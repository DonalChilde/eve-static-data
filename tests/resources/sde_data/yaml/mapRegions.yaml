    ko: "\uC0AC\uC77C\uB7F0\uD2B8 \uBCA0\uC77C\uC740 \uC740\uD558\uACC4\uC758 '\uBD81\
      \uCABD'\uC5D0\uC11C \uC0B0\uBC1C\uC801\uC73C\uB85C \uBED7\uC5B4\uB098\uAC00\uACE0\
      \ \uC788\uB294 \uC9C0\uC5ED\uC73C\uB85C, \uADF8 \uC131\uB2E8\uC5D0\uC11C \uAC00\
      \uC7A5 \uBD88\uAE38\uD55C \uC9C0\uC5ED \uC911 \uD558\uB098\uB85C \uC720\uBA85\
      \uD558\uB2E4. \uC790\uC6D0\uC744 \uCC3E\uC544 \uADF8 \uC9C0\uC5ED\uC744 \uB5A0\
      \uB3CC\uC544\uB2E4\uB2C8\uB294 \uAD6C\uB9AC\uC2A4\uD0C0\uC2A4 \uD574\uC801 \uC5ED\
      \uC2DC, \uC774 \uACC4\uACE1\uC740 \uB9DD\uB839\uC774 \uAE43\uB4E0 \uACFC\uAC70\
      \uC758 \uC794\uC7AC\uB77C\uB294 \uC778\uC2DD\uC744 \uC5C6\uC560\uB294 \uB370\
      \ \uC870\uAE08\uB3C4 \uB3C4\uC6C0\uC774 \uB418\uC9C0 \uC54A\uB294\uB2E4. \uADF8\
      \ \uC9C0\uC5ED \uACF3\uACF3\uC5D0\uC11C \uC870\uBE0C\uC778\uC774 \uBE44\uBC00\
      \ \uC2E4\uD5D8\uC744 \uD589\uD588\uB2E4\uB294 \uC18C\uBB38\uC774 \uB3CC\uAE34\
      \ \uD558\uC9C0\uB9CC, \uAD00\uB828 \uC99D\uAC70\uB97C \uB304 \uC0AC\uB78C\uC740\
      \ \uC9C0\uAE08\uAE4C\uC9C0 \uD55C \uBA85\uB3C4 \uC5C6\uC5C8\uB2E4. \uC791\uB3D9\
      \ \uAC00\uB2A5\uD55C \uC870\uBE0C\uD589 \uC2A4\uD0C0\uAC8C\uC774\uD2B8\uB294\
      \ \uC774\uC81C \uC804\uD600 \uB0A8\uC544 \uC788\uC9C0 \uC54A\uC9C0\uB9CC, \uC774\
      \uACF3\uC740 \uC870\uBE0C\uC758 \uD1B5\uCE58\uB839\uC5D0 \uAC00\uC7A5 \uC778\
      \uC811\uD55C \uC9C0\uC5ED \uC911 \uD558\uB098\uB2E4. \uC870\uBE0C\uC758 \uBE44\
      \uBC00\uC744 \uCE90\uACE0\uC790 \uAC10\uC2DC \uC815\uAC70\uC7A5\uC744 \uC138\
      \uC6CC \uBCF4\uB824\uACE0 \uD55C \uC81C\uAD6D\uB4E4\uB3C4 \uB9CE\uC558\uC9C0\
      \uB9CC \uC774\uB807\uAC8C \uD5D8\uB09C\uD55C \uC9C0\uC5ED\uC5D0\uC11C \uC624\
      \uB798 \uBC84\uD2F4 \uC81C\uAD6D\uC740 \uD558\uB098\uB3C4 \uC5C6\uC5C8\uB2E4\
      . \uC774\uC81C \uADF8 \uC9C0\uC5ED\uC740 \uC644\uC804\uD788 \uCEA1\uC290\uB9AC\
      \uC5B4\uC758 \uD1B5\uC81C \uD558\uC5D0 \uB9E1\uACA8\uC838 \uC788\uB294\uB370\
      , \uCEA1\uC290\uB9AC\uC5B4\uB4E4\uC740 \uC55E\uC11C \uC654\uB358 \uC790\uB4E4\
      \uBCF4\uB2E4 \uB354 \uAD73\uAC74\uD558\uAC8C \uBC84\uD168\uB0B4\uACE0 \uC788\
      \uB2E4."
