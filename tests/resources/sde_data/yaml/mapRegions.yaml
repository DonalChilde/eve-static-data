    ko: "\uB514\uC5B4\uB9AD \uC9C0\uC5ED\uC740 \uC544\uB9C8\uD0C0 \uC790\uCE58\uB839\
      \uC758 \uD1B5\uCE58 \uC9C0\uC5ED\uC73C\uB85C, \uBBFC\uB9C8\uD0C0 \uB300\uD56D\
      \uC7C1\uC774 \uC77C\uC5B4\uB09C \uD6C4, \uC544\uB9C8\uB974 \uCE21\uBA74\uC744\
      \ \uBC29\uC5B4\uD558\uB294 \uC5ED\uD560\uC744 \uB9E1\uAC8C \uB418\uC5C8\uB2E4\
      . \uB514\uC5B4\uB9AD\uC5D0\uC11C\uB294 \uBC18\uB780 \uC138\uB825\uB4E4\uC774\
      \ \uC790\uC2E0\uB4E4\uC758 \uC774\uC804 \uC8FC\uC778\uC758 \uC601\uD1A0\uB97C\
      \ \uB354\uC6B1\uB354 \uAE4A\uC219\uC774 \uB6AB\uACE0 \uB4E4\uC5B4\uAC00\uB824\
      \ \uD558\uBA74\uC11C \uC774\uB4E4\uACFC \uC544\uB9C8\uB974 \uAD70\uB300\uC640\
      \uC758 \uC7A6\uC740 \uAD50\uC804\uC774 \uC77C\uC5B4\uB0AC\uB2E4. \uC544\uB9C8\
      \uD0C0 \uAD70\uB300\uAC00 \uC801\uC9C0 \uC54A\uC740 \uB3C4\uC6C0\uC744 \uC900\
      \ \uB355\uBD84\uC5D0 \uC544\uB9C8\uB974\uB294 \uC601\uD1A0\uB97C \uC9C0\uD0AC\
      \ \uC218 \uC788\uC5C8\uACE0, \uC544\uB9C8\uB974\uB294 \uC544\uB9C8\uD0C0\uC5D0\
      \uAC8C \uADF8\uB4E4\uC758 \uC601\uD1A0\uC758 \uD1B5\uCE58\uAD8C\uC744 \uB0B4\
      \uC5B4\uC8FC\uB294 \uAC83\uC73C\uB85C \uBCF4\uC0C1\uD574 \uC8FC\uC5C8\uB2E4\
      . \uD558\uC9C0\uB9CC, \uD574\uB2F9 \uC6B0\uC8FC \uC9C0\uC5ED\uC740 \uC0C8\uB86D\
      \uAC8C \uD615\uC131\uB418\uACE0 \uC788\uB294 \uBBFC\uB9C8\uD0C0 \uACF5\uD654\
      \uAD6D\uC740 \uBB3C\uB860 \uC81C\uAD6D\uACFC\uB3C4 \uAD6D\uACBD\uC744 \uB098\
      \uB780\uD788 \uD588\uAE30 \uB54C\uBB38\uC5D0, \uC801\uAD6D\uB4E4\uC5D0\uAC8C\
      \ \uB458\uB7EC\uC2F8\uC778 \uCC44, \uC5B4\uB461\uACE0 \uD6C4\uBBF8\uC9C4 \uACF3\
      \uC5D0 \uC790\uB9AC \uC7A1\uC740 \uAF34\uC774\uC5C8\uB2E4. <br><br>\uC548\uC804\
      \uD55C \uACBD\uB85C\uAC00 \uB530\uB85C \uC5C6\uC5C8\uB358\uC9C0\uB77C, \uB514\
      \uC5B4\uB9AD\uC758 \uC9C0\uC5ED \uACBD\uC81C\uB294 \uC0DD\uC874\uC744 \uC704\
      \uD55C \uCD5C\uC120\uCC45\uC73C\uB85C \uC544\uB9C8\uB974\uC640 \uC9C4\uD589\uD558\
      \uB294 \uBB34\uC5ED\uC5D0 \uC758\uC9C0\uD574\uC57C \uD588\uB2E4. \uC544\uB9C8\
      \uD0C0\uB294 \uC218\uC2ED \uB144\uAC04 \uACBD\uAE30\uCE68\uCCB4\uC640 \uD55C\
      \uC815\uB41C \uBB34\uC5ED \uC0C1\uB300\uB77C\uB294 \uC5B4\uB824\uC6C0\uC5D0\uB3C4\
      \ \uAD74\uD558\uC9C0 \uC54A\uACE0 \uBC84\uD168\uB0C8\uC73C\uBA70, \uC774\uB4E4\
      \uC758 \uC758\uC9C0\uB294 \uCD5C\uADFC \uBA87\uC2ED \uB144 \uB3D9\uC548 \uACBD\
      \uAE30 \uBC88\uC601\uC73C\uB85C \uBCF4\uC0C1\uBC1B\uB294 \uC911\uC774\uB2E4\
      . \uC544\uB9C8\uD0C0\uC778\uC774\uB77C\uBA74 \uB204\uAD6C\uB4E0 \uC774 \uD5D8\
      \uB09C\uD55C \uC2DC\uAE30\uC758 \uBC1C\uC790\uCDE8\uB97C \uC790\uB791\uC2A4\uB7FD\
      \uAC8C \uC5EC\uAE30\uBA70, \uC774 \uC0AC\uAC74\uC73C\uB85C \uC544\uB9C8\uD0C0\
      \uC778\uC774 \uC544\uB9C8\uB974\uC778 \uBC29\uC2DD\uC5D0 \uD488\uACE0 \uC788\
      \uB358 \uC2E0\uB8B0\uB294 \uB354\uC6B1\uB354 \uAD73\uAC74\uD574\uC84C\uB2E4."
