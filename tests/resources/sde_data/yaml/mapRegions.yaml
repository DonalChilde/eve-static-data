  description:
    de: A sprawling region in the galactic "north," the Vale of the Silent has a reputation
      as one of the most foreboding regions in the cluster. The Guristas pirates who
      prowl the area, scavenging for resources, do little to dispel the notion that
      the Vale is a haunted relic of times past. Rumors of secret Jovian experiments
      in the area abound, though no one has ever given proof of such things. The region
      is one of the closest areas to Jovian space, despite no longer having any functioning
      stargates leading there. Many of the other Empires have made attempts to set
      up spying stations in an attempt to probe out Jovian secrets, but none have
      lasted long in the harsh area. Now, the area is left totally to capsuleer control
      and they have proven hardier than those who came before them.
    en: A sprawling region in the galactic "north," the Vale of the Silent has a reputation
      as one of the most foreboding regions in the cluster. The Guristas pirates who
      prowl the area, scavenging for resources, do little to dispel the notion that
      the Vale is a haunted relic of times past. Rumors of secret Jovian experiments
      in the area abound, though no one has ever given proof of such things. The region
      is one of the closest areas to Jovian space, despite no longer having any functioning
      stargates leading there. Many of the other Empires have made attempts to set
      up spying stations in an attempt to probe out Jovian secrets, but none have
      lasted long in the harsh area. Now, the area is left totally to capsuleer control
      and they have proven hardier than those who came before them.
    es: "Vale of the Silent, una regi\xF3n extensa en el \xABnorte\xBB gal\xE1ctico,\
      \ tiene fama de ser una de las m\xE1s siniestras del c\xFAmulo. Los piratas\
      \ de los Guristas que merodean por la zona buscando recursos no hacen mucho\
      \ para disipar la idea de que Vale of the Silent es una reliquia encantada de\
      \ tiempos pasados. Abundan los rumores de experimentos jovianos secretos en\
      \ la zona, aunque nadie ha encontrado pruebas. La regi\xF3n es una de las zonas\
      \ m\xE1s cercanas al espacio joviano, pese a que ya no tiene ning\xFAn portal\
      \ estelar que funcione. Muchos de los otros imperios han intentado establecer\
      \ estaciones de espionaje para averiguar los secretos jovianos, pero ninguno\
      \ ha durado mucho en esta zona hostil, que ahora est\xE1 totalmente en manos\
      \ de los capsulistas, que han demostrado ser m\xE1s duros que sus predecesores."
    fr: "Vale of the Silent, r\xE9gion tentaculaire du \xAB\_nord\_\xBB galactique,\
      \ est r\xE9put\xE9 comme l'un des secteurs les plus inhospitaliers des environs.\
      \ Les pirates guristas qui \xE9cument la zone en qu\xEAte de ressources ne font\
      \ rien pour am\xE9liorer la triste notori\xE9t\xE9 de cette contr\xE9e consid\xE9\
      r\xE9e comme les vestiges hant\xE9s d'un lointain pass\xE9. Les rumeurs d'exp\xE9\
      rimentations jove dans les environs vont bon train, bien que personne n'ait\
      \ jamais pu en apporter la preuve. La proximit\xE9 de l'espace jove alimente\
      \ les racontars, malgr\xE9 l'absence de portails stellaires op\xE9rationnels\
      \ permettant de s'y rendre. La plupart des autres empires ont tent\xE9 d'y \xE9\
      tablir des stations d'espionnage afin de percer les secrets jove, mais aucune\
      \ n'a r\xE9sist\xE9 bien longtemps au sein de cette contr\xE9e hostile. Aujourd'hui,\
      \ le secteur est enti\xE8rement aux mains des capsuliers qui se sont av\xE9\
      r\xE9s bien plus coriaces que leurs pr\xE9d\xE9cesseurs."
    ja: "\u9280\u6CB3\u306E\u300C\u5317\u6975\u300D\u65B9\u5411\u306B\u5E83\u304C\u308B\
