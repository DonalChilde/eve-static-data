2:
  description:
    de: "Der Stamm der Minmatar war eine bl\xFChende Zivilisation, bis er vom Imperium\
      \ der Amarr f\xFCr mehr als 700 Jahre versklavt wurde. Eine blutige Rebellion\
      \ konnte viele Minmatar befreien, einige waren jedoch als Sklaven zur\xFCckgeblieben.\
      \ Heute sind die Minmatar robust, geschickt und flei\xDFig. Viele meinen, die\
      \ Demokratie habe ihnen gute Dienste erwiesen, doch k\xF6nne sie nie zur\xFC\
      ckgeben, was ihnen vor langer Zeit genommen wurde. Daher bildeten sie eine Regierung,\
      \ die vor allem ihre Herkunft und Wurzeln repr\xE4sentierte. Sie werden immer\
      \ einen Groll gegen die Amarr hegen und sie sehnen sich nach jenen gl\xFCcklichen\
      \ Tagen zur\xFCck, als die verhassten Schiffe des Imperiums noch nicht angelandet\
      \ waren."
    en: Once a thriving tribal civilization, the Minmatar were enslaved by the Amarr
      Empire for more than 700 years until a massive rebellion freed most, but not
      all, of those held in servitude. The Minmatar people today are resilient, ingenious,
      and hard-working. Many of them believe that democracy, though it has served
      them well for a long time, can never restore what was taken from them so long
      ago. For this reason they have formed a government truly reflective of their
      tribal roots. They will forever resent the Amarrians, and yearn for the days
      before the Empire's accursed ships ever reached their home skies.
    es: "Los minmatarianos, anta\xF1o una pr\xF3spera civilizaci\xF3n tribal, fueron\
      \ esclavizados por el Imperio Amarr durante m\xE1s de 700 a\xF1os hasta que\
      \ una enorme rebeli\xF3n liber\xF3 a la mayor\xEDa de los esclavos, aunque no\
      \ a todos. Los minmatarianos son resistentes, ingeniosos y trabajadores. Muchos\
      \ creen que la democracia, aunque los ha servido bien durante mucho tiempo,\
      \ no puede devolverles lo que se les arrebat\xF3 en el pasado. Por este motivo,\
      \ han formado un gobierno basado en sus ra\xEDces tribales. Siempre estar\xE1\
      n resentidos contra los amarrianos, y recuerdan con a\xF1oranza los d\xEDas\
      \ antes de que las malditas naves del Imperio llegaran a sus cielos."
    fr: "Autrefois une civilisation tribale florissante, les Minmatar ont \xE9t\xE9\
      \ r\xE9duits en esclavage par l'Empire amarr pendant plus de 700\_ans, jusqu'\xE0\
      \ ce qu'une r\xE9bellion massive lib\xE8re la plupart d'entre eux du joug de\
      \ l'envahisseur. Aujourd'hui, les Minmatar sont un peuple d\xE9termin\xE9, ing\xE9\
      nieux et travailleur. Nombre d'entre eux croient que la d\xE9mocratie, m\xEA\
      me si elle a longtemps servi leurs int\xE9r\xEAts, ne pourra jamais leur restituer\
      \ ce qui leur a \xE9t\xE9 d\xE9rob\xE9 jadis. C'est pour cette raison qu'ils\
      \ ont form\xE9 un gouvernement \xE0 l'image de leurs racines tribales. Ils vouent\
      \ une haine inextinguible au peuple amarr, et gardent un souvenir nostalgique\
      \ de l'\xE9poque \xE0 laquelle les maudits vaisseaux de l'empire n'avaient encore\
      \ jamais viol\xE9 l'espace a\xE9rien de leur plan\xE8te natale."
    ja: "\u304B\u3064\u3066\u306F\u8C4A\u304B\u306A\u540C\u65CF\u6587\u5316\u304C\u7BC9\
