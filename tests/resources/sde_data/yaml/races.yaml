    ko: "\uD55C\uB54C \uBC88\uC131\uD55C \uBD80\uC871 \uBB38\uBA85\uC774\uC5C8\uB358\
      \ \uBBFC\uB9C8\uD0C0\uB294 \uC544\uB9C8\uB974 \uC81C\uAD6D\uC5D0 700\uB144 \uB3D9\
