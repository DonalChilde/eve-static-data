    ko: "\uCC99\uBC15\uD55C \uACE0\uD5A5\uC5D0\uC11C \uACE0\uCDA9\uC744 \uACAA\uC5C8\
      \uB358 \uC120\uC870\uC758 \uB178\uB825\uACFC \uC560\uAD6D\uC8FC\uC758\uB97C\
      \ \uAE30\uBC18\uC73C\uB85C \uC138\uC6CC\uC9C4 \uCE7C\uB2E4\uB9AC \uC5F0\uD569\
      \uC740 \uD604\uC7AC \uAD6C\uC2DC\uB300\uC758 \uC774\uC0C1\uC801\uC778 \uB2A5\
      \uB825\uC8FC\uC758 \uBC1C\uC0C1\uC73C\uB85C \uD68C\uADC0\uD558\uAE30\uB97C \uBC14\
      \uB77C\uB294 \uC790\uB4E4\uC774 \uC9C0\uBC30\uD558\uB294 \uCF54\uD37C\uB808\uC774\
      \uC158 \uB3C5\uC7AC\uAD6D\uAC00\uC785\uB2C8\uB2E4. \uC774\uC0AC\uD68C\uC2E4\uC5D0\
      \uC11C\uB294 \uBB3C\uB860 \uC804\uC7A5\uC5D0\uC11C\uB3C4 \uBB34\uC790\uBE44\uD558\
      \uBA70 \uD6A8\uC728\uC801\uC73C\uB85C \uD589\uB3D9\uD558\uB294 \uCE7C\uB2E4\uB9AC\
      \uB294 \uD798\uACFC \uB048\uAE30, \uD488\uC704\uC758 \uC0B4\uC544\uC788\uB294\
      \ \uC0C1\uC9D5\uC785\uB2C8\uB2E4."
