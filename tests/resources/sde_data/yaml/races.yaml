1:
  description:
    de: "Der Staat der Caldari gr\xFCndet sich auf den Grunds\xE4tzen von Patriotismus\
      \ und harter Arbeit, welche die Vorfahren der Caldari manch gro\xDFes Elend\
      \ auf ihrer unwirtlichen Heimatwelt \xFCberstehen lie\xDFen. Heute ist das Land\
      \ eine Diktatur der Konzerne, angef\xFChrt von Herrschern, die fest entschlossen\
      \ sind, das Land zu den alten Idealen der Leistungsgesellschaft zur\xFCckzuf\xFC\
      hren. R\xFCcksichtslos und effizient im Konferenzraum wie auf dem Schlachtfeld,\
      \ sind die Caldari ein lebendes Wahrzeichen von Kraft, Ausdauer und Erhabenheit."
    en: Founded on the tenets of patriotism and hard work that carried its ancestors
      through hardships on an inhospitable homeworld, the Caldari State is today a
      corporate dictatorship, led by rulers who are determined to see it return to
      the meritocratic ideals of old. Ruthless and efficient in the boardroom as well
      as on the battlefield, the Caldari are living emblems of strength, persistence,
      and dignity.
    es: "El Estado Caldari, fundado sobre los principios del patriotismo y del trabajo\
      \ duro que permiti\xF3 a sus ancestros progresar en su inh\xF3spita tierra natal,\
      \ es hoy una dictadura corporativa, liderada por gobernantes cuyo objetivo es\
      \ regresar a los ideales meritocr\xE1ticos de anta\xF1o. Sin compasi\xF3n y\
      \ eficaz tanto en la sala de juntas como en el campo de batalla, los caldaris\
      \ son la personificaci\xF3n de la fuerza, la perseverancia y la dignidad."
    fr: "Fond\xE9 sur les principes de patriotisme et de t\xE9nacit\xE9 qui ont permis\
      \ \xE0 ses anc\xEAtres de surmonter les nombreuses \xE9preuves aff\xE9rentes\
      \ \xE0 leur plan\xE8te d'origine inhospitali\xE8re, l'\xC9tat caldari est aujourd'hui\
      \ une dictature corporative administr\xE9e par des dirigeants d\xE9termin\xE9\
      s \xE0 voir leur nation renouer avec les id\xE9aux m\xE9ritocratiques d'antan.\
      \ Redoutablement efficaces en conseil comme au combat, les Caldari sont la force,\
      \ la pers\xE9v\xE9rance et la dignit\xE9 incarn\xE9es."
    ja: "\u30AB\u30EB\u30C0\u30EA\u9023\u5408\u306E\u7956\u5148\u306F\u3001\u3053\u306E\
