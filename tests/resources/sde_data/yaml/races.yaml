4:
  description:
    de: "Das Imperium der Amarr ist das gr\xF6\xDFte und \xE4lteste der vier Imperien.\
      \ Diese theokratische Gesellschaft wird von einer m\xE4chtigen Kaiserin regiert.\
      \ Das Fundament des Imperiums ist die Sklavenarbeit. Zwar sind die B\xFCrger\
      \ von Amarr engagiert und gebildet, doch in kultureller Hinsicht h\xE4lt sich\
      \ Amarr an eine Grundthese: Was andere Sklaverei nennen, ist f\xFCr sie nur\
      \ ein erster Schritt auf dem Pfad geistiger Entwicklung, der zu einem unersch\xFC\
      tterlichen Glauben f\xFChrt. Trotz einiger R\xFCckschl\xE4ge in der j\xFCngsten\
      \ Geschichte bleibt das Imperium der wohl stabilste und milit\xE4risch m\xE4\
      chtigste Nationalstaat in New Eden."
    en: The Amarr Empire is the largest and oldest of the four empires. Ruled by a
      mighty Empress, this vast theocratic society is supported by a broad foundation
      of slave labor. Amarr citizens tend to be highly educated and fervent individuals,
      and as a culture Amarr adheres to the basic tenet that what others call slavery
      is in fact one step on a indentured person's spiritual path toward fully embracing
      their faith. Despite several setbacks in recent history, the Empire remains
      arguably the most stable and militarily powerful nation-state in New Eden.
    es: "El Imperio Amarr es el m\xE1s grande y antiguo de los cuatro. Esta extensa\
      \ sociedad teocr\xE1tica, gobernada por una poderosa emperatriz, se apoya en\
      \ una gran fuerza esclava. Los ciudadanos amarrianos suelen ser muy cultos y\
      \ apasionados y su filosof\xEDa se basa en que lo que otros llaman esclavitud\
      \ es, en el fondo, un simple paso en el camino espiritual de la persona para\
      \ abrazar la fe. A pesar de varios contratiempos en su historia reciente, siguen\
      \ siendo la naci\xF3n-estado m\xE1s estable y militarmente poderosa de Nuevo\
      \ Ed\xE9n."
    fr: "L\u2019Empire amarr est le plus grand et le plus ancien des quatre empires.\
      \ Gouvern\xE9e par une puissante imp\xE9ratrice, cette vaste soci\xE9t\xE9 th\xE9\
      ocratique s'appuie sur le dur labeur d'innombrables esclaves. Les citoyens amarr\
      \ b\xE9n\xE9ficient g\xE9n\xE9ralement d'une \xE9ducation solide servie par\
      \ une grande ferveur. Sur le plan culturel, ils adh\xE8rent au principe fondamental\
      \ selon lequel ce que d'autres appellent esclavage est en r\xE9alit\xE9 une\
      \ \xE9tape dans le cheminement spirituel d'un individu asservi vers l'adoption\
      \ totale de la foi officielle. Malgr\xE9 plusieurs revers au cours de son histoire\
      \ r\xE9cente, l'empire reste sans doute la nation la plus stable et militairement\
      \ puissante de New Eden."
    ja: "\u30A2\u30DE\u30FC\u5E1D\u56FD\u306F\u30014\u5927\u56FD\u306E\u3046\u3061\
