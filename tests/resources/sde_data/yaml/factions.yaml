500003:
  corporationID: 1000084
  description:
    de: "Das gr\xF6\xDFte der f\xFCnf Hauptimperien, das Imperium der Amarr, ist ein\
      \ ausuferndes Konglomerat feudaler Provinzen, das durch die Macht der Kaiserin\
      \ zusammengehalten wird. Religion hat in der Politik der Amarr immer eine wichtige\
      \ Rolle gespielt und die Amarr glauben, die rechtm\xE4\xDFigen Herrscher der\
      \ Welt zu sein, was die Beziehungen zu ihren Nachbarn verschlechtert. Ein weiterer\
      \ Grund f\xFCr die Abneigung gegen die Amarr vonseiten der anderen Imperien\
      \ ist die Tatsache, dass die Amarr Sklaverei bef\xFCrworten."
    en: The largest of the five main empires, the Amarr Empire is a sprawling patch-work
      of feudal-like provinces held together by the might of the emperor. Religion
      has always played a big part in Amarrian politics and the Amarrians believe
      they are the rightful masters of the world, souring their relations with their
      neighbours. Another source of ill-feelings on part of the other empires is the
      fact that the Amarrians embrace slavery.
    es: "El mayor de los cinco imperios principales, el Imperio Amarr, es una zona\
      \ extensa de provincias feudales que se mantienen unidas por el poder del emperador.\
      \ La religi\xF3n siempre ha desempe\xF1ado un papel importante en la pol\xED\
      tica amarriana, y los ciudadanos creen que son los amos leg\xEDtimos del mundo,\
      \ lo que agria las relaciones con sus vecinos. Otra fuente de rencor por parte\
      \ de los otros imperios es el hecho de que los amarrianos abrazan la esclavitud."
    fr: "L'Empire amarr, le plus grand des cinq empires, est une vaste mosa\xEFque\
      \ de provinces f\xE9odales dont la coh\xE9sion est assur\xE9e par la volont\xE9\
      \ souveraine de l'empereur. La religion a toujours jou\xE9 un grand r\xF4le\
      \ dans la vie politique, et les Amarr se consid\xE8rent comme les ma\xEEtres\
      \ l\xE9gitimes du monde, ce qui ne manque pas d'envenimer leurs relations avec\
      \ les peuples voisins. En outre, le fait que le peuple amarr cautionne l'esclavagisme\
      \ suscite \xE9galement l'indignation des autres empires."
    ja: "5\u3064\u306E\u4E3B\u306A\u5E1D\u56FD\u306E\u4E2D\u3067\u3082\u6700\u5927\
      \u306E\u898F\u6A21\u3092\u8A87\u308B\u30A2\u30DE\u30FC\u5E1D\u56FD\u306F\u3001\
      \u3055\u307E\u3056\u307E\u306A\u9818\u4E3B\u304C\u6CBB\u3081\u308B\u591A\u69D8\
      \u306A\u5C01\u5EFA\u5730\u65B9\u306E\u5E83\u304C\u308A\u3092\u7687\u5E1D\u306E\
      \u6A29\u529B\u304C\u4E00\u3064\u306B\u3064\u306A\u304E\u5408\u308F\u305B\u308B\
      \u3053\u3068\u3067\u51FA\u6765\u3066\u3044\u308B\u3002\u30A2\u30DE\u30FC\u306E\
      \u653F\u6CBB\u3067\u306F\u5B97\u6559\u304C\u91CD\u8981\u306A\u5F79\u5272\u3092\
      \u679C\u305F\u3057\u3066\u304A\u308A\u3001\u30A2\u30DE\u30FC\u4EBA\u306F\u81EA\
      \u3089\u3092\u6B63\u5F53\u306A\u4E16\u754C\u306E\u652F\u914D\u8005\u3067\u3042\
      \u308B\u3068\u4FE1\u3058\u3066\u3044\u308B\u3002\u305D\u306E\u305F\u3081\u3001\
      \u5468\u8FBA\u5404\u56FD\u3068\u826F\u597D\u306A\u95A2\u4FC2\u3092\u7BC9\u304F\
      \u306E\u304C\u96E3\u3057\u3044\u3002\u307E\u305F\u3001\u5974\u96B7\u5236\u5EA6\
      \u3092\u64C1\u8B77\u3057\u3066\u3044\u308B\u3053\u3068\u3082\u3001\u4ED6\u306E\
      \u5E1D\u56FD\u306E\u4E0D\u8208\u3092\u8CB7\u3046\u539F\u56E0\u306E\u4E00\u3064\
      \u3068\u306A\u3063\u3066\u3044\u308B\u3002"
    ko: "\uB2E4\uC12F \uAC1C\uC758 \uC8FC\uC694 \uC81C\uAD6D \uC911 \uAC00\uC7A5 \uD070\
      \ \uADDC\uBAA8\uB97C \uC790\uB791\uD558\uB294 \uC544\uB9C8\uB974 \uC81C\uAD6D\
      \uC740 \uD669\uC81C\uC758 \uB9C9\uAC15\uD55C \uD1B5\uCE58 \uC544\uB798 \uBD09\
      \uAC74\uC8FC\uC758\uC801 \uC9C0\uC5ED\uB4E4\uC774 \uD558\uB098\uB85C \uACB0\uD569\
      \uB418\uC5B4 \uC788\uB294 \uB098\uB77C\uC785\uB2C8\uB2E4. \uC544\uB9C8\uB974\
      \ \uC815\uCE58\uC5D0\uC11C\uB294 \uC5B8\uC81C\uB098 \uC885\uAD50\uAC00 \uC911\
      \uC694\uD55C \uC5ED\uD560\uC744 \uB2F4\uB2F9\uD558\uACE0 \uC788\uC73C\uBA70\
      , \uC544\uB9C8\uB974\uC778\uB4E4\uC740 \uC2A4\uC2A4\uB85C\uB97C \uC138\uC0C1\
      \uC758 \uC62C\uBC14\uB978 \uC8FC\uC778\uC774\uB77C\uACE0 \uAD73\uAC8C \uBBFF\
      \uACE0 \uC788\uC5B4 \uC8FC\uBCC0\uAD6D\uACFC\uC758 \uAD00\uACC4\uAC00 \uC6D0\
      \uB9CC\uD558\uC9C0 \uBABB\uD55C \uD3B8\uC785\uB2C8\uB2E4. \uB2E4\uB978 \uC81C\
      \uAD6D\uC758 \uC785\uC7A5\uC5D0\uC11C\uB3C4 \uC544\uB9C8\uB974 \uC81C\uAD6D\uACFC\
      \ \uC88B\uC740 \uAD00\uACC4\uB97C \uC720\uC9C0\uD558\uC9C0 \uBABB\uD558\uB294\
      \ \uB610 \uB2E4\uB978 \uC774\uC720\uB294 \uC544\uB9C8\uB974\uC778\uC774 \uB178\
      \uC608 \uC81C\uB3C4\uB97C \uC639\uD638\uD558\uAE30 \uB54C\uBB38\uC785\uB2C8\uB2E4\
      ."
    ru: "\u041A\u0440\u0443\u043F\u043D\u0435\u0439\u0448\u0435\u0435 \u0438\u0437\
      \ \u043F\u044F\u0442\u0438 \u043E\u0441\u043D\u043E\u0432\u043D\u044B\u0445\
