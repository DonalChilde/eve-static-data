      \u043F\u0435\u0440\u0438\u044F Amarr \u044F\u0432\u043B\u044F\u0435\u0442\u0441\
      \u044F \u0433\u0438\u0433\u0430\u043D\u0442\u0441\u043A\u0438\u043C \u043B\u043E\
      \u0441\u043A\u0443\u0442\u043D\u044B\u043C \u043E\u0434\u0435\u044F\u043B\u043E\
      \u043C \u0438\u0437 \u0440\u0430\u0437\u043D\u043E\u0448\u0435\u0440\u0441\u0442\
      \u043D\u044B\u0445 \u0444\u0435\u043E\u0434\u0430\u043B\u044C\u043D\u044B\u0445\
      \ \u043F\u0440\u043E\u0432\u0438\u043D\u0446\u0438\u0439, \u0443\u0434\u0435\
      \u0440\u0436\u0438\u0432\u0430\u0435\u043C\u044B\u0445 \u0432\u043C\u0435\u0441\
      \u0442\u0435 \u0432\u043B\u0430\u0441\u0442\u044C\u044E \u0438\u043C\u043F\u0435\
      \u0440\u0430\u0442\u043E\u0440\u0430. \u0420\u0435\u043B\u0438\u0433\u0438\u044F\
      \ \u0432\u0441\u0435\u0433\u0434\u0430 \u0438\u0433\u0440\u0430\u043B\u0430\
      \ \u0432\u0430\u0436\u043D\u0443\u044E \u0440\u043E\u043B\u044C \u0432 \u043F\
      \u043E\u043B\u0438\u0442\u0438\u043A\u0435 Amarr; \u043E\u043D\u0438 \u0432\u0435\
      \u0440\u044F\u0442 \u0432 \u0442\u043E, \u0447\u0442\u043E \u044F\u0432\u043B\
      \u044F\u044E\u0442\u0441\u044F \u043F\u043E\u043B\u043D\u043E\u043F\u0440\u0430\
      \u0432\u043D\u044B\u043C\u0438 \u0445\u043E\u0437\u044F\u0435\u0432\u0430\u043C\
