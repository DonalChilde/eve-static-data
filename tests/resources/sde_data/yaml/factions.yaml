500002:
  corporationID: 1000051
  description:
    de: "Die Republik Minmatar wurde vor \xFCber einem Jahrhundert gegr\xFCndet, als\
      \ die Minmatar in einem Aufstand, der als die Minmatar-Rebellion bekannt wurde,\
      \ ihre Amarr-Feudalherren vertrieben. Die Minmatar wurden darin von der F\xF6\
      deration der Gallente unterst\xFCtzt und bis heute sind beide Nationen enge\
      \ Verb\xFCndete. Allerding lebt derzeit nur ein Viertel der Bev\xF6lkerung der\
      \ Minmatar in der Republik. Die anderen sind zwischen den Sternen verteilt -\
      \ einschlie\xDFlich einer gro\xDFen Gruppe, die sich noch in Sklaverei im Imperium\
      \ der Amarr befindet. Die Minmatar sind unabh\xE4ngig und stolz, besitzen einen\
      \ starken Willen und eine Vielzahl an Stammesbr\xE4uchen."
    en: The Minmatar Republic was formed over a century ago when the Minmatar threw
      out their Amarrian overlords in what is now known as the Minmatar Rebellion.
      In this the Minmatar had the support of the Gallente Federation, and to this
      day the two nations remain close allies. Yet, only a quarter of the Minmatar
      people reside within the Republic. The rest are scattered around the star cluster,
      including a large portion who are still enslaved within the Amarr Empire. Minmatar
      individuals are independent and proud, possessing a strong will and a multitude
      of tribal traditions.
    es: "La Rep\xFAblica Minmatar se form\xF3 hace m\xE1s de un siglo, cuando los\
      \ minmatarianos expulsaron a sus amos amarrianos en lo que hoy se conoce como\
      \ la Rebeli\xF3n de Minmatar. Para ello, contaron con el apoyo de la Federaci\xF3\
      n Gallente, y actualmente siguen manteniendo una estrecha alianza. Sin embargo,\
      \ solo una cuarta parte del pueblo de Minmatar reside en la Rep\xFAblica. El\
      \ resto est\xE1 disperso por todo el c\xFAmulo estelar, incluida una gran parte\
      \ que sigue esclavizada en el Imperio Amarr. Los individuos minmatarianos son\
      \ independientes y orgullosos, poseen una voluntad f\xE9rrea y cuentan con una\
      \ multitud de tradiciones tribales."
    fr: "La R\xE9publique minmatar a vu le jour il y a plus d'un si\xE8cle, lorsque\
      \ le peuple minmatar renversa ses ma\xEEtres amarr au cours de ce que nous appelons\
      \ aujourd'hui la r\xE9bellion minmatar. La F\xE9d\xE9ration gallente soutint\
      \ le mouvement minmatar, et les deux nations restent aujourd'hui encore des\
      \ alli\xE9s proches. Pourtant, seul un quart de la population minmatar r\xE9\
      side aujourd'hui au sein de la R\xE9publique. Les autres sont dispers\xE9s aux\
      \ quatre coins de la galaxie, et une grande partie vit encore sous le joug de\
      \ l'Empire amarr. Les Minmatar sont ind\xE9pendants, fiers et dot\xE9s d'une\
      \ volont\xE9 de fer. Leur vie est r\xE9gie par de nombreuses traditions tribales."
    ja: "\u30DF\u30F3\u30DE\u30BF\u30FC\u5171\u548C\u56FD\u306F\u30011\u4E16\u7D00\
      \u4EE5\u4E0A\u524D\u306B\u30DF\u30F3\u30DE\u30BF\u30FC\u4EBA\u304C\u30DF\u30F3\
      \u30DE\u30BF\u30FC\u8702\u8D77\u306B\u3088\u3063\u3066\u30A2\u30DE\u30FC\u306E\
      \u9818\u4E3B\u3092\u8FFD\u653E\u3057\u305F\u969B\u306B\u6210\u7ACB\u3057\u305F\
      \u3002\u3053\u306E\u3068\u304D\u30DF\u30F3\u30DE\u30BF\u30FC\u4EBA\u304C\u30AC\
      \u30EC\u30F3\u30C6\u9023\u90A6\u306E\u652F\u63F4\u3092\u53D7\u3051\u305F\u3053\
      \u3068\u3082\u3042\u308A\u3001\u4E21\u56FD\u306F\u4ECA\u65E5\u3067\u3082\u89AA\
      \u5BC6\u306A\u540C\u76DF\u95A2\u4FC2\u306B\u3042\u308B\u3002\u3057\u304B\u3057\
      \u5B9F\u969B\u306B\u5171\u548C\u56FD\u5185\u306B\u4F4F\u3093\u3067\u3044\u308B\
      \u30DF\u30F3\u30DE\u30BF\u30FC\u4EBA\u306F\u5168\u4F53\u306E4\u5206\u306E1\u307B\
      \u3069\u3067\u3001\u6B8B\u308A\u306F\u3053\u306E\u4E16\u754C\u306E\u3042\u3061\
      \u3053\u3061\u306B\u6563\u3089\u3070\u3063\u3066\u304A\u308A\u3001\u305D\u306E\
      \u5927\u90E8\u5206\u306F\u4ECA\u3082\u5974\u96B7\u3068\u3057\u3066\u30A2\u30DE\
      \u30FC\u5E1D\u56FD\u306B\u6355\u3089\u308F\u308C\u3066\u3044\u308B\u3002\u30DF\
      \u30F3\u30DE\u30BF\u30FC\u4EBA\u306F\u72EC\u7ACB\u5FC3\u65FA\u76DB\u3067\u8A87\
      \u308A\u9AD8\u304F\u3001\u5F37\u3044\u610F\u5FD7\u3092\u6301\u3061\u3001\u90E8\
      \u65CF\u306E\u3055\u307E\u3056\u307E\u306A\u4F1D\u7D71\u3092\u5B88\u3063\u3066\
      \u3044\u308B\u3002"
    ko: "\uBBFC\uB9C8\uD0C0 \uACF5\uD654\uAD6D\uC740 \uBBFC\uB9C8\uD0C0\uAC00 \uC544\
      \uB9C8\uB974\uC778 \uC9C0\uBC30\uCE35\uC744 \uBAB0\uC544\uB0B8, \uC624\uB298\
      \uB0A0 \uBBFC\uB9C8\uD0C0 \uB300\uD56D\uC7C1\uC774\uB77C\uACE0 \uBD88\uB9AC\uB294\
      \ \uC0AC\uAC74\uC774 \uC788\uACE0 \uB09C \uB4A4\uB85C \uD55C \uC138\uAE30\uC758\
      \ \uC138\uC6D4\uC5D0 \uAC78\uCCD0 \uAC74\uB9BD\uB418\uC5C8\uC2B5\uB2C8\uB2E4\
      . \uBBFC\uB9C8\uD0C0\uB294 \uC774 \uBC18\uB780\uC744 \uC77C\uC73C\uD0A4\uB294\
      \ \uACFC\uC815\uC5D0\uC11C \uAC08\uB780\uD14C \uC5F0\uBC29\uC758 \uB3C4\uC6C0\
      \uC744 \uBC1B\uC558\uC73C\uBA70 \uADF8 \uB355\uBD84\uC5D0 \uB450 \uAD6D\uAC00\
      \uB294 \uC624\uB298\uB0A0\uAE4C\uC9C0 \uB450\uD130\uC6B4 \uC6B0\uC815\uC744\
      \ \uC790\uB791\uD558\uB294 \uB3D9\uB9F9 \uAD00\uACC4\uB97C \uC720\uC9C0 \uC911\
      \uC785\uB2C8\uB2E4. \uD604\uC7AC\uB85C\uC11C\uB294 \uBBFC\uB9C8\uD0C0\uC778\uB4E4\
      \ \uC911 1/4\uB9CC \uC774 \uACF5\uD654\uAD6D\uC5D0\uC11C \uAC70\uC8FC\uD558\uACE0\
      \ \uC788\uC73C\uBA70 \uB098\uBA38\uC9C0\uB294 \uC131\uB2E8 \uC804\uBC18\uC5D0\
      \ \uD769\uC5B4\uC838 \uC788\uC2B5\uB2C8\uB2E4. \uADF8\uC911 \uB300\uB2E4\uC218\
      \uB294 \uC5EC\uC804\uD788 \uC544\uB9C8\uB974 \uC81C\uAD6D\uC5D0\uC11C \uB178\
      \uC608 \uC0DD\uD65C\uC744 \uBC97\uC5B4\uB098\uC9C0 \uBABB\uD558\uACE0 \uC788\
      \uC2B5\uB2C8\uB2E4. \uBBFC\uB9C8\uD0C0 \uC0AC\uB78C\uB4E4\uC740 \uB3C5\uB9BD\
      \uC801\uC778 \uC131\uD5A5\uC744 \uBCF4\uC774\uBA70 \uBD80\uC871 \uC804\uD1B5\
      \uC5D0 \uB300\uD55C \uC790\uBD80\uC2EC\uACFC \uC2E0\uB150\uC774 \uAC15\uD55C\
      \ \uD3B8\uC785\uB2C8\uB2E4."
    ru: "\u0420\u0435\u0441\u043F\u0443\u0431\u043B\u0438\u043A\u0430 Minmatar \u0431\
      \u044B\u043B\u0430 \u043E\u0441\u043D\u043E\u0432\u0430\u043D\u0430 \u0431\u043E\
      \u043B\u0435\u0435 \u0441\u0442\u043E\u043B\u0435\u0442\u0438\u044F \u0442\u043E\
      \u043C\u0443 \u043D\u0430\u0437\u0430\u0434, \u043A\u043E\u0433\u0434\u0430\
      \ Minmatar \u043F\u043E\u0431\u0435\u0434\u0438\u043B\u0438 \u0441\u0432\u043E\
      \u0438\u0445 \u043F\u043E\u0432\u0435\u043B\u0438\u0442\u0435\u043B\u0435\u0439\
      \ Amarr \u0432\u043E \u0432\u0440\u0435\u043C\u044F \u0442\u0430\u043A \u043D\
      \u0430\u0437\u044B\u0432\u0430\u0435\u043C\u043E\u0433\u043E \xAB\u0412\u043E\
      \u0441\u0441\u0442\u0430\u043D\u0438\u044F Minmatar\xBB. \u0418\u0445 \u043F\
      \u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u043B\u0430 \u0424\u0435\
      \u0434\u0435\u0440\u0430\u0446\u0438\u044F Gallente, \u0438 \u0434\u043E \u043D\
      \u0430\u0448\u0438\u0445 \u0434\u043D\u0435\u0439 \u044D\u0442\u0438 \u0434\u0432\
      \u0435 \u043D\u0430\u0446\u0438\u0438 \u043E\u0441\u0442\u0430\u044E\u0442\u0441\
      \u044F \u0431\u043B\u0438\u0437\u043A\u0438\u043C\u0438 \u0441\u043E\u044E\u0437\
      \u043D\u0438\u043A\u0430\u043C\u0438. \u0412\u043C\u0435\u0441\u0442\u0435 \u0441\
      \ \u0442\u0435\u043C \u043D\u0430 \u0442\u0435\u0440\u0440\u0438\u0442\u043E\
      \u0440\u0438\u0438 \u0420\u0435\u0441\u043F\u0443\u0431\u043B\u0438\u043A\u0438\
      \ \u043F\u0440\u043E\u0436\u0438\u0432\u0430\u0435\u0442 \u043B\u0438\u0448\u044C\
      \ \u0447\u0435\u0442\u0432\u0435\u0440\u0442\u044C \u043D\u0430\u0441\u0435\u043B\
      \u0435\u043D\u0438\u044F Minmatar. \u041E\u0441\u0442\u0430\u043B\u044C\u043D\
      \u043E\u0435 \u043D\u0430\u0441\u0435\u043B\u0435\u043D\u0438\u0435 \u0440\u0430\
      \u0437\u0431\u0440\u043E\u0441\u0430\u043D\u043E \u0432\u043E\u043A\u0440\u0443\
      \u0433 \u0437\u0432\u0435\u0437\u0434\u043D\u043E\u0433\u043E \u043A\u043B\u0430\
      \u0441\u0442\u0435\u0440\u0430, \u0430 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\
      \u043B\u044C\u043D\u0430\u044F \u0435\u0433\u043E \u0447\u0430\u0441\u0442\u044C\
      \ \u0432\u0441\u0435 \u0435\u0449\u0435 \u043D\u0430\u0445\u043E\u0434\u0438\
      \u0442\u0441\u044F \u0432 \u0440\u0430\u0431\u0441\u0442\u0432\u0435 \u0443\
      \ \u0418\u043C\u043F\u0435\u0440\u0438\u0438 Amarr. \u041F\u0440\u0435\u0434\
      \u0441\u0442\u0430\u0432\u0438\u0442\u0435\u043B\u0438 Minmatar \u043D\u0435\
      \u0437\u0430\u0432\u0438\u0441\u0438\u043C\u044B, \u0433\u043E\u0440\u0434\u044B\
      , \u043E\u0431\u043B\u0430\u0434\u0430\u044E\u0442 \u0441\u0438\u043B\u044C\u043D\
      \u043E\u0439 \u0432\u043E\u043B\u0435\u0439 \u0438 \u043F\u0440\u0438\u0434\u0435\
      \u0440\u0436\u0438\u0432\u0430\u044E\u0442\u0441\u044F \u043C\u043D\u043E\u0436\
      \u0435\u0441\u0442\u0432\u0430 \u043F\u043B\u0435\u043C\u0435\u043D\u043D\u044B\
      \u0445 \u0442\u0440\u0430\u0434\u0438\u0446\u0438\u0439."
    zh: "\u7C73\u739B\u5854\u5C14\u5171\u548C\u56FD\u5EFA\u4E8E\u4E00\u4E2A\u591A\u4E16\
