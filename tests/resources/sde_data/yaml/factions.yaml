      \u0438\u0438."
    zh: "\u7C73\u739B\u5854\u5C14\u5171\u548C\u56FD\u529B\u56FE\u7EC8\u7ED3\u5B87\u5B99\
      \u4E2D\u7684\u66B4\u653F\u4E0E\u5974\u5F79\u3002"
