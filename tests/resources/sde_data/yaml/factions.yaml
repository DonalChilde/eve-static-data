      \u3046\u3068\u3057\u3066\u3044\u308B\u3002"
    ko: "\uBBFC\uB9C8\uD0C0 \uACF5\uD654\uAD6D\uC758 \uBAA9\uC801\uC740 \uC6B0\uC8FC\
      \uC5D0\uC11C \uB3C5\uC7AC\uC640 \uC5B5\uC555\uC744 \uC885\uACB0\uD558\uB294\
      \ \uAC83\uC785\uB2C8\uB2E4."
    ru: "\u0420\u0435\u0441\u043F\u0443\u0431\u043B\u0438\u043A\u0430 \u041C\u0438\
      \u043D\u043C\u0430\u0442\u0430\u0440 \u0441\u0442\u0440\u0435\u043C\u0438\u0442\
