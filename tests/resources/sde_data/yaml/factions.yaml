    ru: "\u0414\u043B\u044F \u0436\u0438\u0442\u0435\u043B\u0435\u0439 \u0413\u043E\
      \u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u0430 \u041A\u0430\u043B\u0434\
