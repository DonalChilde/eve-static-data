500001:
  corporationID: 1000035
  description:
    de: "Der Staat der Caldari wird von mehreren Mega-Corporations beherrscht. Es\
      \ gibt keine zentrale Regierung - alle Gebiete innerhalb des Staates sind im\
      \ Besitz und unter der Kontrolle von Corporations. Pflichtgef\xFChl und Disziplin\
      \ geh\xF6ren zur B\xFCrgerpflicht eines Caldari, sowie bedingungslose Loyalit\xE4\
      t gegen\xFCber der Corporation, in deren Dienst sie ihr Leben stellen. Die Corporations\
      \ konkurrieren aggressiv sowohl untereinander, als auch mit Firmen au\xDFerhalb\
      \ des Staates, was eine \xE4u\xDFerst kapitalistische Gesellschaft zur Folge\
      \ hat."
    en: The Caldari State is ruled by several mega-corporations. There is no central
      government to speak of - all territories within the State are owned and ruled
      by corporations. Duty and discipline are required traits in Caldari citizens,
      plus unquestioning loyalty to the corporation they live to serve. The corporations
      compete aggressively amongst themselves and with companies outside the State,
      resulting in a highly capitalistic society.
    es: "El Estado Caldari est\xE1 dirigido por varias megacorporaciones. No hay ning\xFA\
      n gobierno central; todos los territorios son propiedad de dichas corporaciones\
      \ y est\xE1n dirigidos por ellas. El deber y la disciplina son rasgos necesarios\
      \ para los ciudadanos de Caldari, adem\xE1s de una lealtad incondicional a la\
      \ corporaci\xF3n a la que viven para servir. Las corporaciones compiten agresivamente\
      \ entre s\xED y con empresas ajenas al Estado, lo que da lugar a una sociedad\
      \ extremadamente capitalista."
    fr: "L'\xC9tat caldari est gouvern\xE9 par plusieurs m\xE9ga-corporations. Il\
      \ ne poss\xE8de pas de gouvernement central \xE0 proprement parler\_; ce sont\
      \ les corporations elles-m\xEAmes qui d\xE9tiennent et administrent tous les\
      \ territoires qui lui sont rattach\xE9s. Discipline et sens du devoir sont les\
      \ fondements de la civilisation caldari, de m\xEAme qu'une loyaut\xE9 inconditionnelle\
      \ envers les corporations au service desquelles les citoyens \u0153uvrent toute\
      \ leur vie. Ces derni\xE8res se livrent une concurrence acharn\xE9e, pas seulement\
      \ entre elles mais aussi avec les entreprises \xE9trang\xE8res, fa\xE7onnant\
      \ ainsi une soci\xE9t\xE9 plac\xE9e sous le signe d'un capitalisme d\xE9brid\xE9\
      ."
    ja: "\u30AB\u30EB\u30C0\u30EA\u9023\u5408\u306F\u3044\u304F\u3064\u304B\u306E\u30E1\
      \u30AC\u30B3\u30FC\u30DD\u30EC\u30FC\u30B7\u30E7\u30F3\u306B\u3088\u3063\u3066\
      \u652F\u914D\u3055\u308C\u3066\u3044\u308B\u3002\u4E2D\u592E\u653F\u5E9C\u3068\
      \u547C\u3079\u308B\u3082\u306E\u306F\u5B58\u5728\u3057\u306A\u3044\u3002\u30AB\
      \u30EB\u30C0\u30EA\u9023\u5408\u5185\u306E\u5168\u3066\u306E\u9818\u571F\u306F\
      \u30B3\u30FC\u30DD\u30EC\u30FC\u30B7\u30E7\u30F3\u304C\u6240\u6709\u3057\u3001\
      \u652F\u914D\u3057\u3066\u3044\u308B\u3002\u30AB\u30EB\u30C0\u30EA\u56FD\u6C11\
      \u306B\u306F\u7FA9\u52D9\u3068\u898F\u5F8B\u304C\u8AB2\u305B\u3089\u308C\u308B\
      \u3060\u3051\u3067\u306A\u304F\u3001\u751F\u6DAF\u30B3\u30FC\u30DD\u30EC\u30FC\
      \u30B7\u30E7\u30F3\u306E\u305F\u3081\u306B\u5C3D\u304F\u3059\u3068\u3044\u3046\
      \u7D76\u5BFE\u7684\u306A\u5FE0\u8AA0\u5FC3\u3082\u6C42\u3081\u3089\u308C\u308B\
      \u3002\u30B3\u30FC\u30DD\u30EC\u30FC\u30B7\u30E7\u30F3\u306F\u56FD\u5185\u3067\
      \u4E92\u3044\u306B\u3057\u306E\u304E\u3092\u524A\u308B\u3060\u3051\u3067\u306A\
      \u304F\u3001\u56FD\u5916\u306E\u4F01\u696D\u3068\u3082\u6FC0\u3057\u3044\u7AF6\
      \u4E89\u3092\u7E70\u308A\u5E83\u3052\u3066\u304A\u308A\u3001\u7D50\u679C\u7684\
      \u306B\u3053\u306E\u56FD\u306F\u8CC7\u672C\u4E3B\u7FA9\u81F3\u4E0A\u793E\u4F1A\
      \u3068\u306A\u3063\u3066\u3044\u308B\u3002"
    ko: "\uCE7C\uB2E4\uB9AC \uC5F0\uD569\uC740 \uC5EC\uB7EC \uBA54\uAC00\uCF54\uD37C\
      \uB808\uC774\uC158\uB4E4\uC758 \uC9C0\uBC30\uD558\uC5D0 \uC6B4\uC601\uB429\uB2C8\
      \uB2E4. \uC911\uC559 \uC815\uBD80\uB85C\uC11C \uAE30\uB2A5\uD558\uB294 \uAE30\
      \uAD00\uC740 \uC874\uC7AC\uD558\uC9C0 \uC54A\uC73C\uBA70 \uC774 \uC5F0\uD569\
      \uC758 \uBAA8\uB4E0 \uC601\uD1A0\uB294 \uC5EC\uB7EC \uCF54\uD37C\uB808\uC774\
      \uC158\uC774 \uC18C\uC720\uD558\uACE0 \uAD00\uB9AC\uD569\uB2C8\uB2E4. \uCE7C\
      \uB2E4\uB9AC \uC2DC\uBBFC\uB4E4\uC740 \uC758\uBB34\uC640 \uADDC\uC728\uC744\
      \ \uD544\uC218 \uB355\uBAA9\uC73C\uB85C \uC5EC\uAE30\uBA70, \uC774\uC5D0 \uB354\
      \uBD88\uC5B4 \uCF54\uD37C\uB808\uC774\uC158\uC744 \uC12C\uAE30\uBA70 \uC808\uB300\
      \uC801\uC778 \uCDA9\uC131\uC2EC\uC744 \uBCF4\uC785\uB2C8\uB2E4. \uCF54\uD37C\
      \uB808\uC774\uC158\uB4E4\uC740 \uC5F0\uD569 \uB0B4\uC5D0\uC11C \uC11C\uB85C\
      \ \uADF8\uB9AC\uACE0 \uC5F0\uD569 \uC678\uBD80\uC758 \uCF54\uD37C\uB808\uC774\
      \uC158\uB4E4\uACFC\uB3C4 \uCE58\uC5F4\uD55C \uACBD\uC7C1\uC744 \uBC8C\uC774\uACE0\
      \ \uC788\uC5B4 \uACE0\uB3C4\uB85C \uC790\uBCF8\uC8FC\uC758\uD654\uB41C \uC0AC\
      \uD68C\uB97C \uD615\uC131\uD558\uACE0 \uC788\uC2B5\uB2C8\uB2E4."
    ru: "\u0413\u043E\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u043E Caldari\
      \ \u0443\u043F\u0440\u0430\u0432\u043B\u044F\u0435\u0442\u0441\u044F \u043D\u0435\
      \u0441\u043A\u043E\u043B\u044C\u043A\u0438\u043C\u0438 \u043C\u0435\u0433\u0430\
      \u043A\u043E\u0440\u043F\u043E\u0440\u0430\u0446\u0438\u044F\u043C\u0438. \u0412\
      \ \u043D\u0451\u043C \u043D\u0435\u0442 \u0446\u0435\u043D\u0442\u0440\u0430\
      \u043B\u044C\u043D\u043E\u0433\u043E \u043F\u0440\u0430\u0432\u0438\u0442\u0435\
      \u043B\u044C\u0441\u0442\u0432\u0430 \u043A\u0430\u043A \u0442\u0430\u043A\u043E\
      \u0432\u043E\u0433\u043E; \u0432\u0441\u0435\u043C\u0438 \u0442\u0435\u0440\u0440\
      \u0438\u0442\u043E\u0440\u0438\u044F\u043C\u0438 \u0432 \u043F\u0440\u0435\u0434\
      \u0435\u043B\u0430\u0445 \u0413\u043E\u0441\u0443\u0434\u0430\u0440\u0441\u0442\
      \u0432\u0430 \u0432\u043B\u0430\u0434\u0435\u044E\u0442 \u0438 \u0443\u043F\u0440\
      \u0430\u0432\u043B\u044F\u044E\u0442 \u043A\u043E\u0440\u043F\u043E\u0440\u0430\
      \u0446\u0438\u0438. \u0414\u043E\u043B\u0433 \u0438 \u0434\u0438\u0441\u0446\
      \u0438\u043F\u043B\u0438\u043D\u0430 \u044F\u0432\u043B\u044F\u044E\u0442\u0441\
      \u044F \u043E\u0442\u043B\u0438\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u044B\
      \u043C\u0438 \u0447\u0435\u0440\u0442\u0430\u043C\u0438 \u0433\u0440\u0430\u0436\
      \u0434\u0430\u043D Caldari. \u041E\u043D\u0438 \u0442\u0430\u043A\u0436\u0435\
      \ \u0438\u0441\u043A\u043B\u044E\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\
      \ \u043F\u0440\u0435\u0434\u0430\u043D\u044B \u043A\u043E\u0440\u043F\u043E\u0440\
      \u0430\u0446\u0438\u0438, \u0432 \u043A\u043E\u0442\u043E\u0440\u043E\u0439\
      \ \u0441\u043B\u0443\u0436\u0430\u0442. \u041A\u043E\u0440\u043F\u043E\u0440\
      \u0430\u0446\u0438\u0438 \u0432\u0435\u0434\u0443\u0442 \u044F\u0440\u043E\u0441\
      \u0442\u043D\u0443\u044E \u043A\u043E\u043D\u043A\u0443\u0440\u0435\u043D\u0442\
      \u043D\u0443\u044E \u0431\u043E\u0440\u044C\u0431\u0443, \u043A\u0430\u043A\
      \ \u043C\u0435\u0436\u0434\u0443 \u0441\u043E\u0431\u043E\u0439, \u0442\u0430\
      \u043A \u0438 \u043F\u0440\u043E\u0442\u0438\u0432 \u043A\u043E\u043C\u043F\u0430\
      \u043D\u0438\u0439-\xAB\u0447\u0443\u0436\u0430\u043A\u043E\u0432\xBB. \u0412\
      \ \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u0435 \u044D\u0442\u043E\
      \u0433\u043E \u0440\u0430\u0437\u0432\u0438\u043B\u043E\u0441\u044C \u0430\u0433\
      \u0440\u0435\u0441\u0441\u0438\u0432\u043D\u043E\u0435 \u043A\u0430\u043F\u0438\
      \u0442\u0430\u043B\u0438\u0441\u0442\u0438\u0447\u0435\u0441\u043A\u043E\u0435\
      \ \u043E\u0431\u0449\u0435\u0441\u0442\u0432\u043E."
    zh: "\u52A0\u8FBE\u91CC\u5408\u4F17\u56FD\u7531\u591A\u4E2A\u8D85\u7EA7\u96C6\u56E2\
