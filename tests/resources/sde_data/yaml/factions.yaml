    zh: "\u5728\u52A0\u8FBE\u91CC\u5408\u4F17\u56FD\u7684\u6700\u9AD8\u8363\u8000\u662F\
      \u4E3A\u519B\u56E2\u5E26\u6765\u8363\u5149\u3002"
