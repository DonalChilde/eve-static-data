  shortDescription:
    de: "Der Staat der Caldari kennt keine gr\xF6\xDFere Ehre, als der eigenen Corporation\
      \ zu Ruhm und Ehre zu verhelfen."
    en: In the Caldari State, there is no higher honor than bringing glory to one's
      corporation.
    es: "En el Estado Caldari no hay mayor honor que cubrir de gloria a la propia\
      \ corporaci\xF3n."
    fr: "Dans l'\xC9tat caldari, nul honneur n'est plus grand que celui d'apporter\
      \ la gloire \xE0 sa corporation."
    ja: "\u30AB\u30EB\u30C0\u30EA\u9023\u5408\u3067\u306F\u3001\u30B3\u30FC\u30DD\u30EC\
      \u30FC\u30B7\u30E7\u30F3\u3092\u7E41\u6804\u3055\u305B\u308B\u3053\u3068\u4EE5\
      \u4E0A\u306E\u540D\u8A89\u306F\u5B58\u5728\u3057\u306A\u3044\u3002"
    ko: "\uCE7C\uB2E4\uB9AC \uC5F0\uD569\uC5D0\uC11C \uCD5C\uACE0\uC758 \uBA85\uC608\
      \uB294 \uC790\uC2E0\uC774 \uC18D\uD55C \uCF54\uD37C\uB808\uC774\uC158\uC5D0\
