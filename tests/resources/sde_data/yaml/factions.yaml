    de: "Die Republik Minmatar strebt danach, Tyrannei und Unterdr\xFCckung im gesamten\
      \ Cluster zu beenden."
    en: The Minmatar Republic seeks to end tyranny and oppression across the cluster.
    es: "La Rep\xFAblica Minmatar pretende acabar con la tiran\xEDa y la opresi\xF3\
      n por todo el c\xFAmulo."
    fr: "La R\xE9publique minmatar cherche \xE0 mettre un terme \xE0 la tyrannie et\
      \ l'oppression \xE0 travers la galaxie."
    ja: "\u30DF\u30F3\u30DE\u30BF\u30FC\u5171\u548C\u56FD\u306F\u3001\u661F\u56E3\u306E\
