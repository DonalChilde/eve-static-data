  shortDescription:
    de: Das Imperium der Amarr beruht auf dem Glauben an den Einen Wahren Gott und
      die Treue zum Thron.
    en: The Amarr Empire is built upon faith in the One True God and loyalty to the
      Throne.
    es: "El Imperio Amarr se construy\xF3 sobre la fe en el \xFAnico y verdadero Dios\
      \ y la lealtad al Trono."
    fr: "L'Empire amarr est \xE9rig\xE9 sur sa Foi dans un dieu unique et sa loyaut\xE9\
      \ in\xE9branlable envers le Tr\xF4ne."
