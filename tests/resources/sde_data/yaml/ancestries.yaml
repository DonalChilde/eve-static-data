  charisma: 0
  description:
    de: "Viele Amarr gedenken noch der Hochzeit des Imperiums, als scheinbar keine\
      \ Macht des Universums ihren Siegeszug aufhalten konnte. Sie verabscheuen das\
      \ neue System und sehen dessen Beschwichtigungspolitik als Schw\xE4che an, weil\
      \ sie der glorreichen Vergangenheit des Imperiums spottet."
    en: Many Amarrians still dream of the glory days of the Empire, when it seemed
      that no power in the cluster could defy the will of the Empire. They abhor the
      conciliatory policies of recent regimes, regarding them as weak and counter
      to everything the Empire has stood for in its magnificent history.
    es: "Muchos amarrianos a\xFAn sue\xF1an con los gloriosos d\xEDas del Imperio,\
      \ cuando parec\xEDa que ning\xFAn poder del c\xFAmulo pod\xEDa desafiar su imponente\
      \ voluntad. Aborrecen las pol\xEDticas conciliadoras de los reg\xEDmenes recientes,\
      \ pues las consideran d\xE9biles y contrarias a todo lo que el Imperio ha representado\
      \ en su magn\xEDfica historia."
    fr: "De nombreux Amarr r\xEAvent encore et toujours de renouer avec l'\xE2ge d'or\
      \ de leur civilisation, une \xE9poque o\xF9 la volont\xE9 de l'empire r\xE9\
      gnait en ma\xEEtresse incontest\xE9e sur la galaxie. Ils ex\xE8crent la politique\
      \ complaisante des r\xE9gimes r\xE9cents, qu'ils consid\xE8rent comme faible\
      \ et contraire \xE0 tous les principes d\xE9fendus par l'empire au cours de\
      \ sa glorieuse histoire."
    ja: "\u30A2\u30DE\u30FC\u4EBA\u306E\u591A\u304F\u306F\u3001\u5E1D\u56FD\u306E\u610F\
