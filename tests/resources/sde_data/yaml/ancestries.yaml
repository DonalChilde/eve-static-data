1:
  bloodlineID: 5
  charisma: 3
  description:
    de: "Die meisten L\xE4ndereien Amarrs geh\xF6ren den Gro\xDFgrundbesitzern, die\
      \ \xFCblicherweise erzkonservativ sind und die Tradition hochhalten. Einige\
      \ haben sich indes von ihren engstirnigen und machtgierigen Zeitgenossen distanziert\
      \ und setzen sich lieber f\xFCr religi\xF6se und grundlegende wirtschaftliche\
      \ Reformen innerhalb ihrer Gesellschaft ein. Dabei hat sich besonders der udorianische\
      \ Thronanw\xE4rter Catiz Tash-Murkon hervorgetan."
    en: Holders, the major landholding class in Amarr society, are generally conservative
      traditionalists. A few, however, have elected to break ranks with their hidebound
      and power-hungry peers, instead supporting the modernization of their society's
      religion and substantial economic reform. Their champion is Catiz Tash-Murkon,
      the Udorian Royal Heir.
    es: "Los terratenientes, la principal clase poseedora de tierras en la sociedad\
      \ de Amarr, son generalmente tradicionalistas conservadores. Sin embargo, unos\
      \ pocos han optado por romper filas con sus cong\xE9neres, retr\xF3grados y\
      \ \xE1vidos de poder, y apoyan la modernizaci\xF3n de la religi\xF3n de su sociedad\
      \ y una reforma econ\xF3mica sustancial. Su elegida es Catiz Tash-Murkon, la\
      \ heredera real udoriana."
    fr: "Les grands propri\xE9taires, l'aristocratie terrienne de la soci\xE9t\xE9\
      \ amarr, sont g\xE9n\xE9ralement des traditionalistes conservateurs. Toutefois,\
      \ une poign\xE9e d'entre eux a d\xE9cid\xE9 de se d\xE9solidariser de leurs\
      \ pairs r\xE9actionnaires et avides de pouvoir, pr\xE9f\xE9rant au contraire\
      \ promouvoir la r\xE9forme religieuse et la modernisation \xE9conomique de leur\
      \ soci\xE9t\xE9. La figure de proue de ce mouvement progressiste n'est autre\
      \ que Catiz Tash-Murkon, pr\xE9tendante au tr\xF4ne d'ascendance udorian."
    ja: "\u30A2\u30DE\u30FC\u793E\u4F1A\u306E\u4E3B\u8981\u306A\u5730\u4E3B\u968E\u7D1A\
      \u3067\u3042\u308B\u9818\u4E3B\u306F\u3001\u7DCF\u3058\u3066\u4FDD\u5B88\u7684\
      \u306A\u4F1D\u7D71\u4E3B\u7FA9\u8005\u3060\u3002\u3057\u304B\u3057\u5C11\u6570\
      \u306E\u8005\u305F\u3061\u306F\u3001\u305D\u306E\u9811\u8FF7\u3067\u6A29\u529B\
      \u6B32\u306E\u5F37\u3044\u9589\u9396\u7684\u306A\u968E\u7D1A\u3092\u6253\u7834\
      \u3059\u308B\u9053\u3092\u9078\u3073\u3001\u793E\u4F1A\u306E\u5B97\u6559\u7684\
      \u8FD1\u4EE3\u5316\u3068\u5927\u5E45\u306A\u7D4C\u6E08\u6539\u9769\u3092\u652F\
      \u6301\u3057\u3066\u3044\u308B\u3002\u5F7C\u3089\u306B\u3068\u3063\u3066\u306E\
      \u82F1\u96C4\u306F\u3001\u30E6\u30FC\u30C9\u30EA\u30A2\u30F3\u7687\u4F4D\u7D99\
      \u627F\u8005\u3067\u3042\u308B\u30AD\u30E3\u30C6\u30A3\u30B9\u30BF\u30C3\u30B7\
      \u30E5\u30E0\u30FC\u30B3\u30F3\u3067\u3042\u308B\u3002"
    ko: "\uC544\uB9C8\uB974 \uC0AC\uD68C\uC5D0\uC11C \uAC00\uC7A5 \uB9CE\uC740 \uB545\
      \uC744 \uC18C\uC720\uD55C \uACC4\uAE09\uC778 \uD640\uB354\uB294 \uC77C\uBC18\
      \uC801\uC73C\uB85C \uBCF4\uC218\uC801\uC778 \uC804\uD1B5\uC8FC\uC758\uC790\uB4E4\
      \uC785\uB2C8\uB2E4. \uD558\uC9C0\uB9CC \uC774\uB4E4 \uC911 \uC18C\uC218\uAC00\
      \ \uC0AC\uD68C \uC885\uAD50\uC758 \uD604\uB300\uD654\uC640 \uC2E4\uC9C8\uC801\
      \uC778 \uACBD\uC81C \uAC1C\uD601\uC744 \uC9C0\uC9C0\uD558\uBA74\uC11C \uACE0\
      \uC9D1\uC2A4\uB7FD\uACE0 \uAD8C\uB825\uC5D0 \uAD76\uC8FC\uB9B0 \uB3D9\uB8CC\uC640\
      \uC758 \uAD00\uACC4\uB97C \uB04A\uAE30\uB85C \uD588\uC2B5\uB2C8\uB2E4. \uC774\
      \uB4E4\uC744 \uC774\uB044\uB294 \uC0AC\uB78C\uC740 \uC720\uB3C4\uB9AC\uC548\
      \ \uC655\uC871\uC758 \uACC4\uC2B9\uC790\uC778 \uCE74\uD2F0\uC988 \uD0C0\uC26C\
      -\uBA38\uB974\uCF58\uC785\uB2C8\uB2E4."
    ru: "\u0412\u043B\u0430\u0434\u0435\u0442\u0435\u043B\u0438, \u043A\u0440\u0443\
      \u043F\u043D\u044B\u0439 \u0437\u0435\u043C\u043B\u0435\u0432\u043B\u0430\u0434\
      \u0435\u043B\u044C\u0447\u0435\u0441\u043A\u0438\u0439 \u043A\u043B\u0430\u0441\
      \u0441 \u0432 \u043E\u0431\u0449\u0435\u0441\u0442\u0432\u0435 Amarr, \u044F\
      \u0432\u043B\u044F\u044E\u0442\u0441\u044F \u0432 \u0431\u043E\u043B\u044C\u0448\
      \u0438\u043D\u0441\u0442\u0432\u0435 \u0441\u0432\u043E\u0451\u043C \u043A\u043E\
      \u043D\u0441\u0435\u0440\u0432\u0430\u0442\u0438\u0432\u043D\u044B\u043C\u0438\
      \ \u0442\u0440\u0430\u0434\u0438\u0446\u0438\u043E\u043D\u0430\u043B\u0438\u0441\
      \u0442\u0430\u043C\u0438. \u0422\u0435\u043C \u043D\u0435 \u043C\u0435\u043D\
      \u0435\u0435, \u043D\u0435\u043A\u043E\u0442\u043E\u0440\u044B\u0435 \u0438\u0437\
      \ \u043D\u0438\u0445 \u0440\u0435\u0448\u0438\u043B\u0438 \u043E\u0442\u0434\
      \u0430\u043B\u0438\u0442\u044C\u0441\u044F \u043E\u0442 \u0441\u0432\u043E\u0438\
      \u0445 \u0443\u0437\u043A\u043E\u043B\u043E\u0431\u044B\u0445 \u0438 \u0432\u043B\
      \u0430\u0441\u0442\u043E\u043B\u044E\u0431\u0438\u0432\u044B\u0445 \u0441\u043E\
      \u043F\u043B\u0435\u043C\u0435\u043D\u043D\u0438\u043A\u043E\u0432, \u043F\u043E\
      \u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044F \u043C\u043E\u0434\u0435\
      \u0440\u043D\u0438\u0437\u0430\u0446\u0438\u044E \u0440\u0435\u043B\u0438\u0433\
      \u0438\u0438 \u0441\u0432\u043E\u0435\u0433\u043E \u043E\u0431\u0449\u0435\u0441\
      \u0442\u0432\u0430 \u0438 \u0441\u0435\u0440\u044C\u0451\u0437\u043D\u044B\u0435\
      \ \u044D\u043A\u043E\u043D\u043E\u043C\u0438\u0447\u0435\u0441\u043A\u0438\u0435\
      \ \u0440\u0435\u0444\u043E\u0440\u043C\u044B. \u0418\u0445 \u043B\u0438\u0434\
      \u0435\u0440\u043E\u043C \u044F\u0432\u043B\u044F\u0435\u0442\u0441\u044F Catiz\
      \ Tash-Murkon, \u043D\u0430\u0441\u043B\u0435\u0434\u043D\u0438\u043A \u043A\
      \u043E\u0440\u043E\u043B\u0435\u0432\u0441\u043A\u043E\u0433\u043E \u043F\u0440\
      \u0435\u0441\u0442\u043E\u043B\u0430 Udorian."
    zh: "\u8D35\u65CF\u662F\u827E\u739B\u793E\u4F1A\u4E2D\u638C\u63A7\u5730\u76D8\u7684\
