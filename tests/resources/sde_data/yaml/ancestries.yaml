2:
  bloodlineID: 5
  charisma: 1
  description:
    de: "Einige B\xFCrgerliche k\xF6nnen aus dem strikten Kastensystem der amarrianischen\
      \ Gesellschaft ausbrechen und sich einen Namen machen - zumeist durch Handel\
      \ oder andere kaufm\xE4nnische T\xE4tigkeiten. Politische Positionen innerhalb\
      \ des Imperiums bleiben ihnen zwar auf immer verwehrt, jedoch k\xF6nnen sie\
      \ durch interstellaren Handel zu viel Reichtum, Macht und Einfluss gelangen."
    en: "Some commoners manage to break out of Amarrian society's rigid class divisions\
      \ and carve out an elevated niche for themselves, usually through trade or other\
      \ mercantile activities. Though they can never attain political office within\
      \ the empire, they are free to accrue vast amounts of wealth \u2013 along with\
      \ no small measure of power and influence - through interstellar trade."
    es: "Hay plebeyos que consiguen liberarse de las r\xEDgidas divisiones clasistas\
      \ de la sociedad de Amarr y se hacen un hueco elevado, normalmente a trav\xE9\
      s del comercio u otras actividades mercantiles. Aunque no pueden alcanzar cargos\
      \ pol\xEDticos dentro del imperio, son libres de acumular grandes cantidades\
      \ de riqueza \u2014junto con un grado considerable de poder e influencia\u2014\
      \ a trav\xE9s del comercio interestelar."
    fr: "Certains roturiers parviennent \xE0 s'affranchir du syst\xE8me de classe\
      \ rigide pour faire leur trou dans la soci\xE9t\xE9 amarr, le plus souvent gr\xE2\
      ce au commerce ou \xE0 d'autres activit\xE9s mercantiles. Bien qu'il leur soit\
      \ impossible d'acc\xE9der au cercle restreint de la politique imp\xE9riale,\
      \ ils sont libres d'amasser d'immenses fortunes, ainsi que le pouvoir et l'influence\
      \ qui en d\xE9coulent, gr\xE2ce au commerce interstellaire."
    ja: "\u4E00\u822C\u5EB6\u6C11\u306E\u4E2D\u306B\u306F\u3001\u30A2\u30DE\u30FC\u793E\
