    ko: "\uC544\uB9C8\uB974\uC778 \uB300\uBD80\uBD84\uC740 \uC5EC\uC804\uD788 \uC81C\
      \uAD6D\uC758 \uADF8 \uC601\uAD11\uC2A4\uB7EC\uC6E0\uB358 \uB098\uB0A0\uC744\
      \ \uAFC8\uAFB8\uACE0 \uC788\uC2B5\uB2C8\uB2E4. \uB2F9\uC2DC\uC5D0\uB294 \uD074\
      \uB7EC\uC2A4\uD130\uC5D0 \uC788\uB294 \uADF8 \uC5B4\uB5A4 \uC138\uB825\uB3C4\
