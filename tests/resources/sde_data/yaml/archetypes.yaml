2:
  description:
    de: "Wahrzeichen sind Orte von historischer, geografischer oder politischer Bedeutung\
      \ f\xFCr New Eden."
    en: Landmarks are sites of historical, geographical or political significance
      to New Eden.
    es: "Los lugares emblem\xE1ticos son zonas de importancia hist\xF3rica, geogr\xE1\
      fica o pol\xEDtica para Nuevo Ed\xE9n."
    fr: "Les rep\xE8res sont des sites qui ont une importance historique, g\xE9ographique\
      \ ou politique pour New Eden."
    ja: "\u30E9\u30F3\u30C9\u30DE\u30FC\u30AF\u306F\u30CB\u30E5\u30FC\u30A8\u30C7\u30F3\
      \u306E\u6B74\u53F2\u7684\u3001\u5730\u7406\u7684\u3001\u653F\u6CBB\u7684\u306B\
      \u91CD\u8981\u306A\u30B5\u30A4\u30C8\u3067\u3059\u3002"
    ko: "\uB79C\uB4DC\uB9C8\uD06C\uB294 \uB274\uC5D0\uB374\uC758 \uC5ED\uC0AC, \uC9C0\
      \uB9AC, \uC815\uCE58\uC640 \uAD00\uB828\uD558\uC5EC \uC911\uC694\uD55C \uC758\
      \uBBF8\uB97C \uC9C0\uB2CC \uC0AC\uC774\uD2B8\uC785\uB2C8\uB2E4."
    ru: "\u0414\u043E\u0441\u0442\u043E\u043F\u0440\u0438\u043C\u0435\u0447\u0430\u0442\
      \u0435\u043B\u044C\u043D\u043E\u0441\u0442\u0438\_\u2014 \u044D\u0442\u043E\
      \ \u043C\u0435\u0441\u0442\u0430, \u0438\u043C\u0435\u044E\u0449\u0438\u0435\
      \ \u0438\u0441\u0442\u043E\u0440\u0438\u0447\u0435\u0441\u043A\u0443\u044E,\
      \ \u0442\u0435\u0440\u0440\u0438\u0442\u043E\u0440\u0438\u0430\u043B\u044C\u043D\
      \u0443\u044E \u0438\u043B\u0438 \u043F\u043E\u043B\u0438\u0442\u0438\u0447\u0435\
      \u0441\u043A\u0443\u044E \u0446\u0435\u043D\u043D\u043E\u0441\u0442\u044C \u0434\
      \u043B\u044F \u041D\u043E\u0432\u043E\u0433\u043E \u042D\u0434\u0435\u043C\u0430\
      ."
    zh: "\u5730\u6807\u662F\u5BF9\u65B0\u4F0A\u7538\u5177\u6709\u5386\u53F2\u3001\u5730\
      \u7406\u6216\u653F\u6CBB\u610F\u4E49\u7684\u5730\u70B9\u3002"
  title:
    de: Wahrzeichen
    en: Landmarks
    es: "Lugares emblem\xE1ticos"
    fr: "Rep\xE8res"
    ja: "\u30E9\u30F3\u30C9\u30DE\u30FC\u30AF"
    ko: "\uB79C\uB4DC\uB9C8\uD06C"
    ru: "\u0414\u043E\u0441\u0442\u043E\u043F\u0440\u0438\u043C\u0435\u0447\u0430\u0442\
      \u0435\u043B\u044C\u043D\u043E\u0441\u0442\u0438"
    zh: "\u5730\u6807"
24:
  description:
    de: "In Kampfgebieten befinden sich feindliche Streitkr\xE4fte. Um siegreich hervorzugehen,\
      \ m\xFCssen Sie Ihre Verteidigungs- und ihre Angriffstaktiken gut ausbalancieren."
    en: Combat Sites are locations featuring hostile forces where you have to balance
      defensive and offensive tactics in order to be triumphant.
    es: "Las zonas de combate son lugares que presentan fuerzas hostiles en los que\
      \ debes equilibrar las t\xE1cticas defensivas y ofensivas para triunfar."
    fr: "Les sites de combat sont des lieux o\xF9 se trouvent des forces ennemies.\
      \ Vous devrez trouver un \xE9quilibre entre tactiques d\xE9fensives et offensives\
      \ afin de triompher."
    ja: "\u6226\u95D8\u30B5\u30A4\u30C8\u306B\u306F\u6575\u52E2\u529B\u304C\u51FA\u73FE\
      \u3057\u3001\u9632\u885B\u304A\u3088\u3073\u653B\u52E2\u306E\u30D0\u30E9\u30F3\
      \u30B9\u3092\u53D6\u308A\u306A\u304C\u3089\u884C\u52D5\u3059\u308B\u3053\u3068\
      \u3067\u52DD\u5229\u3067\u304D\u307E\u3059\u3002"
    ko: "\uC804\uD22C \uC0AC\uC774\uD2B8\uC5D0\uB294 \uC801\uB300\uC801\uC778 \uC138\
      \uB825\uC774 \uB4F1\uC7A5\uD569\uB2C8\uB2E4. \uBC29\uC5B4\uC640 \uACF5\uACA9\
      \uC758 \uADE0\uD615\uC744 \uAC16\uCD98 \uC804\uB7B5\uC744 \uC900\uBE44\uD574\
      \uC57C \uC2B9\uB9AC\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4."
    ru: "\u0413\u043E\u0440\u044F\u0447\u0438\u0435 \u0442\u043E\u0447\u043A\u0438\
      \_\u2014 \u044D\u0442\u043E \u0440\u0430\u0439\u043E\u043D\u044B, \u0437\u0430\
      \u043D\u044F\u0442\u044B\u0435 \u0432\u0440\u0430\u0436\u0435\u0441\u043A\u0438\
      \u043C\u0438 \u0441\u0438\u043B\u0430\u043C\u0438. \u0427\u0442\u043E\u0431\u044B\
      \ \u043E\u0434\u043E\u043B\u0435\u0442\u044C \u043F\u0440\u043E\u0442\u0438\u0432\
      \u043D\u0438\u043A\u0430, \u043D\u0443\u0436\u043D\u043E \u0443\u043C\u0435\u043B\
      \u043E \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\
      \ \u0442\u0430\u043A\u0442\u0438\u043A\u0438 \u043E\u0431\u043E\u0440\u043E\u043D\
      \u044B \u0438\_\u043D\u0430\u0441\u0442\u0443\u043F\u043B\u0435\u043D\u0438\u044F\
      ."
    zh: "\u6218\u6597\u5730\u70B9\u662F\u654C\u5BF9\u52BF\u529B\u7684\u805A\u96C6\u5730\
      \uFF0C\u4F60\u5FC5\u987B\u5728\u9632\u5FA1\u548C\u8FDB\u653B\u6218\u672F\u4E4B\
      \u95F4\u505A\u51FA\u53D6\u820D\u624D\u80FD\u8D62\u5F97\u80DC\u5229\u3002"
  title:
    de: Kampfgebiete
    en: Combat Sites
    es: Zonas de combate
    fr: Sites de combat
    ja: "\u6226\u95D8\u30B5\u30A4\u30C8"
    ko: "\uC804\uD22C \uC0AC\uC774\uD2B8"
    ru: "\u0413\u043E\u0440\u044F\u0447\u0438\u0435 \u0442\u043E\u0447\u043A\u0438"
    zh: "\u6218\u6597\u5730\u70B9"
27:
  description:
    de: Gebiete, in denen sich Asteroiden befinden, aus denen Erz abgebaut werden
      kann.
    en: Sites that contain asteroids from which ores can be harvested.
    es: Zonas que contienen asteroides de los que se pueden extraer menas.
    fr: "Des sites qui contiennent des ast\xE9ro\xEFdes dans lesquels des minerais\
      \ peuvent \xEAtre collect\xE9s."
    ja: "\u63A1\u6398\u3067\u9271\u7269\u3092\u56DE\u53CE\u3067\u304D\u308B\u30A2\u30B9\
      \u30C6\u30ED\u30A4\u30C9\u304C\u542B\u307E\u308C\u305F\u30B5\u30A4\u30C8\u3002"
    ko: "\uAD11\uBB3C\uC744 \uCC44\uCDE8\uD560 \uC218 \uC788\uB294 \uC18C\uD589\uC131\
      \uC774 \uBD84\uD3EC\uD574 \uC788\uB294 \uC0AC\uC774\uD2B8\uC785\uB2C8\uB2E4."
    ru: "\u0420\u0430\u0439\u043E\u043D\u044B, \u0433\u0434\u0435 \u043D\u0430\u0445\
      \u043E\u0434\u044F\u0442\u0441\u044F \u0430\u0441\u0442\u0435\u0440\u043E\u0438\
      \u0434\u044B, \u0438\u0437 \u043A\u043E\u0442\u043E\u0440\u044B\u0445 \u043C\
      \u043E\u0436\u043D\u043E \u0438\u0437\u0432\u043B\u0435\u0447\u044C \u0440\u0443\
      \u0434\u0443."
    zh: "\u542B\u6709\u5C0F\u884C\u661F\u7684\u5730\u70B9\uFF0C\u53EF\u4EE5\u4ECE\u4E2D\
      \u91C7\u96C6\u77FF\u77F3\u3002"
  title:
    de: "Asteroideng\xFCrtel"
    en: Ore Anomalies
    es: Cinturones de asteroides
    fr: "Ceintures d'ast\xE9ro\xEFdes"
    ja: "\u30A2\u30B9\u30C6\u30ED\u30A4\u30C9\u30D9\u30EB\u30C8"
    ko: "\uC18C\uD589\uC131 \uBCA8\uD2B8"
    ru: "\u041F\u043E\u044F\u0441\u0430 \u0430\u0441\u0442\u0435\u0440\u043E\u0438\
      \u0434\u043E\u0432"
    zh: "\u5C0F\u884C\u661F\u5E26"
