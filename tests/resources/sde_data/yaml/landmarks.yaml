      \u0430\u0442\u0430 EVE. \u041C\u043D\u043E\u0433\u043E \u0442\u044B\u0441\u044F\
      \u0447\u0435\u043B\u0435\u0442\u0438\u0439 \u0442\u043E\u043C\u0443 \u043D\u0430\
