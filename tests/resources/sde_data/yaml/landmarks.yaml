    ko: "\uB2E4\uC12F \uAC1C\uC758 \uC8FC\uC694 \uC81C\uAD6D \uC911 \uAC00\uC7A5 \uD070\
      \ \uADDC\uBAA8\uB97C \uC790\uB791\uD558\uB294 \uC544\uB9C8\uB974 \uC81C\uAD6D\
      \uC740 \uD669\uC81C\uC758 \uB9C9\uAC15\uD55C \uD1B5\uCE58 \uC544\uB798 \uBD09\
