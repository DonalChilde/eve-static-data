      \uC758 \uC62C\uBC14\uB978 \uC8FC\uC778\uC774\uB77C\uACE0 \uAD73\uAC8C \uBBFF\
      \uACE0 \uC788\uC5B4 \uC8FC\uBCC0\uAD6D\uACFC\uC758 \uAD00\uACC4\uAC00 \uC6D0\
      \uB9CC\uD558\uC9C0 \uBABB\uD55C \uD3B8\uC785\uB2C8\uB2E4. \uB2E4\uB978 \uC81C\
      \uAD6D\uC758 \uC785\uC7A5\uC5D0\uC11C\uB3C4 \uC544\uB9C8\uB974 \uC81C\uAD6D\uACFC\
