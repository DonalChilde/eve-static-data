    ko: "\uD55C\uB54C \uC544\uB9C8\uB974 \uD504\uB77C\uC784\uC740 '\uC544\uC2A4\uB77C\
      '\uB77C\uB294 \uC774\uB984\uC73C\uB85C \uBD88\uB838\uC2B5\uB2C8\uB2E4. \uC774\
      \ \uC774\uB984\uC740 \uC544\uB9C8\uB974\uAC00 \uC804 \uC138\uACC4\uB97C \uC815\
      \uBCF5\uD574 \uB274\uC5D0\uB374\uC5D0 \uC704\uB300\uD55C \uC81C\uAD6D\uC744\
      \ \uC138\uC6B0\uAE30 \uC804\uAE4C\uC9C0 \uC0AC\uC6A9\uB418\uC5C8\uB358 \uC774\
      \uB984\uC785\uB2C8\uB2E4. \uC544\uD2B8\uB77C\uB294 \uC624\uB798\uC804 \uC544\
      \uB9C8\uB974 \uC0AC\uD68C\uC5D0 \uB3D9\uD654\uB41C \uD2B8\uB8E8 \uC544\uB9C8\
      \uB974, \uCE74\uB2C8\uB4DC, \uC720\uB3C4\uB9AC\uC548\uC758 \uBCF8 \uACE0\uD5A5\
      \uC785\uB2C8\uB2E4. <br><br>\uADF8\uB7EC\uB098 \uC544\uB9C8\uB974 \uC81C\uAD6D\
      \uC740 \uC6CC\uB099\uC5D0 \uAD49\uC7A5\uD788 \uBC29\uB300\uD55C \uC601\uD1A0\
      \uC640 \uC720\uAD6C\uD55C \uC5ED\uC0AC\uB97C \uC790\uB791\uD558\uB294 \uD0D3\
      \uC5D0 \uC544\uB9C8\uB974\uC758 \uB9CE\uC740 \uC815\uCC29 \uD589\uC131 \uC911\
      \ \uAC00\uC7A5 \uC624\uB798\uB41C \uD589\uC131\uB4E4\uC774 \uC544\uB9C8\uB974\
      \uC758 \uBCF8 \uACE0\uD5A5\uC73C\uB85C \uC624\uD574\uB97C \uBC1B\uACE4 \uD569\
      \uB2C8\uB2E4. \uADF8\uC911\uC5D0\uC11C\uB3C4 \uAC00\uC7A5 \uC798 \uC54C\uB824\
      \uC9C4 \uACF3\uC740 '\uC4F0\uB860 \uC6D4\uB4DC'\uC77C \uAC83\uC785\uB2C8\uB2E4\
      . \uC544\uB9C8\uB974 \uC790\uCCB4\uB97C \uB458\uB7EC\uC2F8\uACE0 \uC788\uB294\
      \ \uC774 \uD56D\uC131\uACC4\uB4E4\uC740 \uC774\uBE0C \uAC8C\uC774\uD2B8\uAC00\
      \ \uBD95\uAD34\uB41C \uD6C4 \uC0C8\uB85C \uC9C0\uC5B4\uC9C4 \uAC8C\uC774\uD2B8\
      \ \uB124\uD2B8\uC6CC\uD06C\uC5D0 \uCD5C\uCD08\uB85C \uC5F0\uACB0\uB418\uC5C8\
      \uB358 \uACF3\uC785\uB2C8\uB2E4. <br><br>\uADF8\uB7FC\uC5D0\uB3C4 \uC5EC\uC804\
      \uD788 \uC81C\uAD6D\uC758 \uC911\uC2EC\uC744 \uC9C0\uD0A4\uB294 \uAC83\uC740\
      \ \uC544\uB9C8\uB974 \uD56D\uC131\uACC4\uC774\uBA70, \uACE0\uB300 \uC544\uB9C8\
      \uB974 \uD504\uB77C\uC784\uC740 \uC218\uC2ED\uC5B5 \uB144 \uB3D9\uC548 \uC2E0\
      \uC131\uD55C \uB545\uC73C\uB85C \uCD94\uC559\uBC1B\uC73C\uBA70 \uC81C\uAD6D\uC758\
      \ \uC655\uC88C \uC790\uB9AC\uB97C \uC9C0\uD0A4\uACE0 \uC788\uC2B5\uB2C8\uB2E4\
      ."
    ru: "\u041A\u043E\u0433\u0434\u0430-\u0442\u043E, \u0435\u0449\u0435 \u0434\u043E\
      \ \u0442\u043E\u0433\u043E, \u043A\u0430\u043A Amarr \u043F\u043E\u043A\u043E\
      \u0440\u0438\u043B\u0438 \u0432\u0435\u0441\u044C \u0441\u0432\u043E\u0439 \u043C\
      \u0438\u0440 \u0438 \u043F\u0440\u0438\u0441\u0442\u0443\u043F\u0438\u043B\u0438\
      \ \u043A \u0441\u043E\u0437\u0434\u0430\u043D\u0438\u044E \u0432\u0435\u043B\
      \u0438\u0447\u0430\u0439\u0448\u0435\u0439 \u0438\u043C\u043F\u0435\u0440\u0438\
      \u0438 \u0432 New Eden, \u043F\u043B\u0430\u043D\u0435\u0442\u0430 Amarr Prime\
      \ \u0431\u044B\u043B\u0430 \u0438\u0437\u0432\u0435\u0441\u0442\u043D\u0430\
      \ \u043A\u0430\u043A Athra. \u042D\u0442\u043E \u0440\u043E\u0434\u043D\u043E\
      \u0439 \u043C\u0438\u0440 True Amarr, Khanid \u0438 Udorian \u2014 \u043D\u0430\
      \u0440\u043E\u0434\u0430, \u0434\u0430\u0432\u043D\u044B\u043C-\u0434\u0430\u0432\
      \u043D\u043E \u0430\u0441\u0441\u0438\u043C\u0438\u043B\u0438\u0440\u043E\u0432\
      \u0430\u043D\u043D\u043E\u0433\u043E \u0432 \u043E\u0431\u0449\u0435\u0441\u0442\
      \u0432\u043E Amarr.\n\u041E\u0434\u043D\u0430\u043A\u043E \u0438\u043C\u043F\
      \u0435\u0440\u0438\u044F Amarr \u044F\u0432\u043B\u044F\u0435\u0442\u0441\u044F\
      \ \u043D\u0430\u0441\u0442\u043E\u043B\u044C\u043A\u043E \u043E\u0431\u0448\u0438\
      \u0440\u043D\u043E\u0439 \u0438 \u0434\u0440\u0435\u0432\u043D\u0435\u0439,\
      \ \u0447\u0442\u043E \u0441\u0442\u0430\u0440\u0435\u0439\u0448\u0438\u0435\
      \ \u0438\u0437 \u043C\u043D\u043E\u0436\u0435\u0441\u0442\u0432\u0430 \u0435\
      \u0435 \u043E\u0431\u0438\u0442\u0430\u0435\u043C\u044B\u0445 \u043F\u043B\u0430\
      \u043D\u0435\u0442 \u0442\u0430\u043A\u0436\u0435 \u0441\u0447\u0438\u0442\u0430\
      \u044E\u0442\u0441\u044F \u0420\u043E\u0434\u043D\u044B\u043C\u0438 \u041C\u0438\
      \u0440\u0430\u043C\u0438 Amarr. \u041D\u0430\u0438\u0431\u043E\u043B\u0435\u0435\
      \ \u043F\u0440\u0435\u0441\u0442\u0438\u0436\u043D\u044B\u043C\u0438 \u0438\u0437\
      \ \u043D\u0438\u0445, \u043F\u043E\u0436\u0430\u043B\u0443\u0439, \u0441\u0447\
      \u0438\u0442\u0430\u044E\u0442\u0441\u044F \xAB\u0422\u0440\u043E\u043D\u043D\
      \u044B\u0435 \u043C\u0438\u0440\u044B\xBB \u2014 \u043C\u0438\u0440\u044B, \u043E\
      \u043A\u0440\u0443\u0436\u0430\u044E\u0449\u0438\u0435 \u0441\u0430\u043C\u0443\
      \ \u0441\u0438\u0441\u0442\u0435\u043C\u0443 Amarr, \u043A\u043E\u0442\u043E\
      \u0440\u044B\u0435 \u0431\u044B\u043B\u0438 \u043F\u0435\u0440\u0432\u044B\u043C\
      \u0438 \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u044B \u043D\u043E\u0432\
      \u043E\u0439 \u0441\u0435\u0442\u044C\u044E \u0432\u0440\u0430\u0442 \u043F\u043E\
      \u0441\u043B\u0435 \u0440\u0430\u0437\u0440\u0443\u0448\u0435\u043D\u0438\u044F\
      \ \u0432\u0440\u0430\u0442 EVE. \u0422\u0435\u043C \u043D\u0435 \u043C\u0435\
      \u043D\u0435\u0435 \u0441\u0438\u0441\u0442\u0435\u043C\u0430 Amarr \u043E\u0441\
      \u0442\u0430\u0435\u0442\u0441\u044F \u0446\u0435\u043D\u0442\u0440\u043E\u043C\
      \ \u0438\u043C\u043F\u0435\u0440\u0438\u0438; \u0434\u0440\u0435\u0432\u043D\
      \u044F\u044F \u043F\u043B\u0430\u043D\u0435\u0442\u0430 Amarr Prime, \u043D\u0430\
      \ \u043A\u043E\u0442\u043E\u0440\u043E\u0439 \u0440\u0430\u0441\u043F\u043E\u043B\
      \u043E\u0436\u0435\u043D \u0418\u043C\u043F\u0435\u0440\u0441\u043A\u0438\u0439\
      \ \u0422\u0440\u043E\u043D, \u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\
      \u0441\u044F \u0431\u0435\u0441\u0441\u0447\u0435\u0442\u043D\u044B\u043C\u0438\
      \ \u043C\u0438\u043B\u043B\u0438\u0430\u0440\u0434\u0430\u043C\u0438 \u043B\u044E\
      \u0434\u0435\u0439 \u043A\u0430\u043A \u0441\u0432\u044F\u0449\u0435\u043D\u043D\
      \u0430\u044F \u0437\u0435\u043C\u043B\u044F."
    zh: "\u66FE\u7ECF\uFF0C\u827E\u739B\u9996\u661F\u88AB\u79F0\u4F5C\u201C\u963F\u63D0\
