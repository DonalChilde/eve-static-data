3:
  description:
    de: "Amarr Prime war urspr\xFCnglich als \"Athra\" bekannt. So hie\xDF es vor\
      \ seiner Eroberung durch die Amarr, welche ihr Imperium zum gr\xF6\xDFten in\
      \ ganz New Eden ausweiteten. Echte Amarr, Khanid und Udorianer stammen von Amarr\
      \ Prime, wobei letztere als einst unterjochtes Volk l\xE4ngst in der amarrianischen\
      \ Gesellschaft aufgegangen sind. Das Imperium ist allerdings derart gro\xDF\
      \ und besteht schon so lange, dass viele der in der Fr\xFChphase eroberten Planeten\
      \ den Bewohnern auch als Heimat gelten. Am meisten sch\xE4tzt man dabei die\
      \ \"Thronwelten\": Diese Systeme im direkten Umkreis Amarrs fanden als erste\
      \ nach der Zerst\xF6rung des EVE-Tores Anschluss an ein Netzwerk neu errichteter\
      \ Tore. Amarr selbst bleibt als System indes nach wie vor das Herz des Imperiums,\
      \ denn auf Amarr Prime befindet sich der Imperiale Thronsitz - heiliger Boden\
      \ f\xFCr Milliarden Gl\xE4ubige."
    en: "Once, Amarr Prime was known as 'Athra', its name before the Amarr conquered\
      \ the entire globe and began to carve out the greatest empire in New Eden. It\
      \ is the original home world of the True Amarr, the Khanid, and the Udorians,\
      \ a subject people long ago assimilated into Amarr society. \n\nThe Amarr Empire\
      \ is so vast and ancient, however, that the oldest of its many settled planets\
      \ have also come to be regarded as Amarr Home Worlds. Among these, perhaps the\
      \ highest prestige is given to the 'Throne Worlds', those systems surrounding\
      \ Amarr itself and the first to be connected in a newly-built gate network since\
      \ the collapse of the EVE gate. \n\nNevertheless, the Amarr system remains at\
      \ the centre of the Empire, with ancient Amarr Prime as the seat of an Imperial\
      \ Throne, venerated by countless billions as holy ground."
    es: "Hace tiempo, Amarr Prime era conocido como \xABAthra\xBB, su nombre antes\
      \ de que Amarr conquistara todo el mundo y forjara el mayor imperio de Nuevo\
      \ Ed\xE9n. Es el mundo natal de los amarrianos verdaderos, los Khanid y los\
      \ udorianos, que hace mucho tiempo que se integraron en la sociedad de Amarr.\
      \ \n\nSin embargo, el Imperio Amarr es tan vasto y ancestral que los m\xE1s\
      \ antiguos de sus numerosos planetas colonizados tambi\xE9n han pasado a llamarse\
      \ Mundos Natales Amarrianos. Entre estos, puede que el m\xE1s prestigioso sea\
      \ Throne Worlds, cuyos sistemas rodean Amarr y fueron los primeros en conectarse\
      \ a una nueva red de portales tras el colapso del Portal de EVE. \n\nSin embargo,\
      \ el sistema Amarr permanece en el centro del Imperio, con el antiguo Amarr\
      \ Prime como sede del Trono Imperial, venerado por miles de millones de personas\
      \ como suelo sagrado."
    fr: "Autrefois, avant que les Amarr conqui\xE8rent la plan\xE8te tout enti\xE8\
      re pour fonder le plus grand empire de New Eden, Amarr Prime \xE9tait d\xE9\
      nomm\xE9e \xAB\_Athra\_\xBB. Il s'agit de la plan\xE8te d'origine des v\xE9\
      ritables Amarr, des Khanid et des Udorian, un peuple asservi et assimil\xE9\
      \ depuis longtemps \xE0 la soci\xE9t\xE9 amarr. \n\nToutefois, l'Empire amarr\
      \ est si vaste et si ancr\xE9 dans le temps que les plus anciennes de ses nombreuses\
      \ plan\xE8tes colonis\xE9es sont aussi consid\xE9r\xE9es de nos jours comme\
      \ parties int\xE9grantes des mondes amarr. Parmi elles, le plus grand prestige\
      \ revient aux \xAB\_Throne Worlds\_\xBB, voisins imm\xE9diats d'Amarr et premiers\
      \ syst\xE8mes \xE0 avoir \xE9t\xE9 int\xE9gr\xE9s \xE0 un nouveau r\xE9seau\
      \ de portails reconstruit apr\xE8s la destruction de l'EVE Gate. \n\nCela \xE9\
      tant, le syst\xE8me amarr demeure au centre de l'Empire et c'est \xE0 Amarr\
      \ Prime que si\xE8ge le tr\xF4ne imp\xE9rial, v\xE9n\xE9r\xE9 par des milliards\
      \ de sujets comme une terre sacr\xE9e."
    ja: "\u307E\u3060\u30A2\u30DE\u30FC\u304C\u60D1\u661F\u5168\u571F\u3092\u5F81\u670D\
