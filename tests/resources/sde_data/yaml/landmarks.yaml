      \u306E\u3059\u3079\u3066\u306E\u60D1\u661F\u3092\u5439\u304D\u98DB\u3070\u3057\
      \u3001\u8106\u5F31\u306A\u690D\u6C11\u30B3\u30ED\u30CB\u30FC\u3092\u3042\u308F\
      \u3084\u5168\u6EC5\u306E\u702C\u6238\u969B\u306B\u9665\u308C\u305F\u3002\u73FE\
      \u5728\u3067\u3082\u3001\u3046\u304B\u3064\u306B\u30B2\u30FC\u30C8\u3078\u8FD1\
      \u3065\u304D\u3059\u304E\u308C\u3070\u3001\u5468\u56F2\u3092\u4ECA\u306A\u304A\
      \u5439\u304D\u8352\u308C\u308B\u78C1\u6C17\u5D50\u306B\u3064\u304B\u307E\u3063\
      \u3066\u305F\u3061\u307E\u3061\u3070\u3089\u3070\u3089\u306B\u306A\u3063\u3066\
      \u3057\u307E\u3046\u3002"
    ko: "\uB274\uC5D0\uB374 \uD56D\uC131\uACC4\uC5D0\uB294 \uD1B5\uACFC\uD560 \uC218\
      \ \uC5C6\uB294 \uC774\uBE0C \uAC8C\uC774\uD2B8\uAC00 \uC788\uC2B5\uB2C8\uB2E4\
      . \uC218\uCC9C \uB144 \uC804 \uBAA8\uB4E0 \uC778\uAC04\uC758 \uC120\uC870\uB4E4\
      \uC740 \uC774 \uAC8C\uC774\uD2B8\uB97C \uC774\uC6A9\uD574 \uC774\uBE0C\uC758\
      \ \uC138\uACC4\uB97C \uC624\uAC14\uC2B5\uB2C8\uB2E4. \uADF8\uB7EC\uB098 \uB274\
      \uC5D0\uB374 \uD56D\uC131\uACC4\uC758 \uBAA8\uB4E0 \uD589\uC131\uC744 \uD30C\
      \uAD34\uD558\uACE0 \uC778\uAC04\uB4E4\uC758 \uC5F0\uC57D\uD55C \uC815\uCC29\uC9C0\
      \uB97C \uBA78\uC885 \uC9C1\uC804\uAE4C\uC9C0 \uBAB0\uACE0 \uAC04 \uD06C\uB098\
      \uD070 \uC7AC\uC559\uC774 \uC77C\uC5B4\uB09C \uB4A4\uB85C \uC774 \uAC8C\uC774\
      \uD2B8\uB294 \uC624\uB79C \uC2DC\uAC04\uC774 \uC9C0\uB09C \uC9C0\uAE08\uAE4C\
      \uC9C0\uB3C4 \uB2EB\uD600\uC788\uC8E0. \uC624\uB298\uB0A0 \uC774 \uAC8C\uC774\
      \uD2B8\uC5D0 \uAC00\uAE4C\uC774 \uB2E4\uAC00\uAC00\uB294 \uAC83\uB9CC\uD07C\
      \ \uC5B4\uB9AC\uC11D\uC740 \uC77C\uC740 \uC5C6\uC2B5\uB2C8\uB2E4. \uC774 \uAC70\
      \uB300\uD55C \uAC8C\uC774\uD2B8\uB97C \uC5EC\uC804\uD788 \uB458\uB7EC\uC2F8\uACE0\
      \ \uC788\uB294 \uC790\uAE30 \uD3ED\uD48D \uB54C\uBB38\uC5D0 \uC628 \uBAB8\uC774\
      \ \uC0B0\uC0B0\uC870\uAC01\uB0A0 \uD14C\uB2C8\uAE4C\uC694."
    ru: "\u0412 \u0441\u0438\u0441\u0442\u0435\u043C\u0435 New Eden \u043D\u0430\u0445\
      \u043E\u0434\u044F\u0442\u0441\u044F \u043D\u0435\u043F\u0440\u043E\u0445\u043E\
