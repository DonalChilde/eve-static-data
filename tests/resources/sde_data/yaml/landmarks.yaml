      \u043E\u0434\u043D\u043E \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043B\
      \u0438\u0441\u044C \u044D\u0442\u0438\u043C\u0438 \u0432\u0440\u0430\u0442\u0430\
      \u043C\u0438 \u0434\u043B\u044F \u043F\u0443\u0442\u0435\u0448\u0435\u0441\u0442\
      \u0432\u0438\u044F \u0432 \u043C\u0438\u0440 EVE. \u041D\u043E \u0432\u0440\u0430\
      \u0442\u0430 \u0434\u0430\u0432\u043D\u043E \u0443\u0436\u0435 \u0437\u0430\u043A\
      \u0440\u044B\u043B\u0438\u0441\u044C \u0432 \u0440\u0435\u0437\u0443\u043B\u044C\
      \u0442\u0430\u0442\u0435 \u043A\u0430\u0442\u0430\u0441\u0442\u0440\u043E\u0444\
      \u044B, \u0443\u043D\u0438\u0447\u0442\u043E\u0436\u0438\u0432\u0448\u0435\u0439\
      \ \u0432\u0441\u0435 \u043F\u043B\u0430\u043D\u0435\u0442\u044B \u0441\u0438\
      \u0441\u0442\u0435\u043C\u044B New Eden \u0438 \u043F\u043E\u0441\u0442\u0430\
      \u0432\u0438\u0432\u0448\u0435\u0439 \u0445\u0440\u0443\u043F\u043A\u0438\u0435\
      \ \u0447\u0435\u043B\u043E\u0432\u0435\u0447\u0435\u0441\u043A\u0438\u0435 \u043F\
      \u043E\u0441\u0435\u043B\u0435\u043D\u0438\u044F \u043D\u0430 \u0433\u0440\u0430\
      \u043D\u044C \u0432\u044B\u043C\u0438\u0440\u0430\u043D\u0438\u044F. \u0412\
      \ \u043D\u0430\u0448\u0438 \u0434\u043D\u0438 \u0432\u0441\u044F\u043A\u0438\
      \u0439 \u0431\u0435\u0437\u0443\u043C\u0435\u0446, \u0440\u0435\u0448\u0438\u0432\
      \u0448\u0438\u0439 \u043F\u0440\u0438\u0431\u043B\u0438\u0437\u0438\u0442\u044C\
      \u0441\u044F \u043A \u0432\u0440\u0430\u0442\u0430\u043C, \u0431\u0443\u0434\
      \u0435\u0442 \u0440\u0430\u0437\u043E\u0434\u0440\u0430\u043D \u043C\u0430\u0433\
      \u043D\u0438\u0442\u043D\u044B\u043C\u0438 \u0431\u0443\u0440\u044F\u043C\u0438\
      , \u0432\u0441\u0451 \u0435\u0449\u0451 \u0431\u0443\u0448\u0443\u044E\u0449\
      \u0438\u043C\u0438 \u0443 \u044D\u0442\u0438\u0445 \u0438\u0441\u043F\u043E\u043B\
      \u0438\u043D\u0441\u043A\u0438\u0445 \u0432\u043E\u0440\u043E\u0442."
    zh: "\u795E\u79D8\u7684\u65B0\u4F0A\u7538\u4E4B\u95E8\u4F4D\u4E8E\u65B0\u4F0A\u7538\
