1:
  description:
    de: "Im System New Eden befindet sich das nicht passierbare Sprungtor EVE. Vor\
      \ Jahrtausenden wurde es von den Vorfahren aller menschlichen Rassen verwendet,\
      \ um zur Welt von EVE zu reisen. Aber das Tor ist schon seit langer Zeit geschlossen:\
      \ eine Katastrophe, die alle Planeten im System New Eden zerst\xF6rt und die\
      \ empfindlichen menschlichen Kolonien an den Rand der Ausrottung gebracht hat.\n\
      Jedermann, der heutzutage dumm genug ist, sich zu nahe an das Sprungtor heranzuwagen,\
      \ wird von den Magnetst\xFCrmen, die immer noch um das riesige Tor toben, zerrissen\
      \ werden."
    en: In the system of New Eden sits the impenetrable EVE Gate. Thousands of years
      ago the forefathers of all the human races used the gate to travel to the world
      of EVE. But the gate has been closed for a long time, a catastrophe that destroyed
      all planets in the New Eden system and plunged the fragile human settlements
      to the brink of extinction. Anyone foolish enough to get too close to the gate
      today will be ripped apart by the magnetic storms that still surround the massive
      gate.
    es: "En el sistema de Nuevo Ed\xE9n se encuentra el impenetrable Portal de EVE.\
      \ Hace miles de a\xF1os, los antepasados de todas las razas humanas utilizaban\
      \ el portal para viajar al mundo de EVE. Pero la puerta lleva cerrada mucho\
      \ tiempo, una cat\xE1strofe que destruy\xF3 todos los planetas del sistema de\
      \ Nuevo Ed\xE9n y llev\xF3 a los fr\xE1giles asentamientos humanos al borde\
      \ de la extinci\xF3n. Hoy, todo aquel lo suficientemente insensato como para\
      \ acercarse demasiado al portal ser\xE1 destruido por las tormentas magn\xE9\
      ticas que a\xFAn lo rodean."
    fr: "Dans le syst\xE8me de New Eden tr\xF4ne l'imp\xE9n\xE9trable EVE Gate. Il\
      \ y a des mill\xE9naires, les anc\xEAtres de toutes les races humaines l'utilisaient\
      \ pour se rendre dans l'univers d'EVE. Mais le portail se referma il y a fort\
      \ longtemps, d\xE9truisant au passage toutes les plan\xE8tes de New Eden au\
      \ cours d'un cataclysme qui faillit entra\xEEner l'extinction des fragiles colonies\
      \ humaines. Aujourd'hui, les imprudents qui osent s'en approcher sont aussit\xF4\
      t mis en pi\xE8ces par les temp\xEAtes magn\xE9tiques qui y font rage."
    ja: "\u30CB\u30E5\u30FC\u30A8\u30C7\u30F3\u30B7\u30B9\u30C6\u30E0\u306B\u306F\u8AB0\
      \u3082\u901A\u308B\u3053\u3068\u306E\u3067\u304D\u306A\u3044EVE Gate\u304C\u3042\
      \u308B\u3002\u4ECA\u304B\u3089\u6570\u5343\u5E74\u306E\u6614\u3001\u3053\u306E\
      \u30B2\u30FC\u30C8\u3092\u901A\u3063\u3066\u3084\u3063\u3066\u304D\u305F\u4EBA\
      \u985E\u3053\u305D\u304C\u3001\u73FE\u5728EVE\u306B\u4F4F\u3080\u4EBA\u3005\u306E\
      \u7956\u5148\u306A\u306E\u3067\u3042\u308B\u3002\u3060\u304C\u30B2\u30FC\u30C8\
      \u306F\u3068\u3046\u306E\u6614\u306B\u5D29\u58CA\u3057\u3001\u305D\u306E\u4F59\
