  description:
    de: "Die CBD Corporation ist eine der gr\xF6\xDFten Export/Import-Firmen im Hoheitsgebiet\
      \ der Caldari. Die Corporation verf\xFCgt \xFCber Handelsverbindungen weit und\
      \ breit und hat st\xE4ndig eine riesige Warenmenge im Umlauf."
