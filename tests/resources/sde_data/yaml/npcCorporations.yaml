      The corporation has established trade links far and wide, with a huge amount
      of goods in constant fluctuation.
    es: "La Corporaci\xF3n CBD es uno de los mayores exportadores e importadores en\
      \ el espacio Caldari. Ha establecido v\xEDnculos comerciales en todos los confines\
      \ del espacio y tiene una gran cantidad de bienes en constante movimiento."
