      \u4FA1: \u8A13\u7DF4\uFF081/10\uFF09</P>"
    ko: "<P>\uC0B0\uC0E4 \uB124\uC774\uC158\uC774 \uC810\uB839\uD558\uACE0 \uC788\uB294\
