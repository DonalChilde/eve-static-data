  description:
    de: "<P>Dieser Raumverwerfungskomplex ist von den Soldaten von Sansha's Nation\
      \ besetzt. Das Gebiet h\xE4lt als Milit\xE4rau\xDFenposten her und erlaubt es\
      \ Sansha-Truppen, die Waffensysteme neu zu laden, Cyberimplantate zu reparieren\
      \ und \xDCberwachungsdaten zu verarbeiten. Der Komplex enth\xE4lt au\xDFerdem\
      \ die Cryo-Kammern f\xFCr Hunderte von Sansha-Reservisten.</P>\n\n<P>DED Bedrohungseinstufung:\
      \ Training (1 von 10)</P>"
    en: '<P>This deadspace complex is occupied by the soldiers of Sansha''s Nation.
      The area serves as a military outpost, allowing their troops to rearm their
      weapon systems, repair personal cyberimplants and process surveillance data.
      The complex also stores the cryo-chambers for hundreds of Sansha reserves.</P>

      <P>DED Threat Assessment: Training (1 of 10)</P>'
    es: "<P>Este complejo del espacio muerto est\xE1 ocupado por los soldados de la\
      \ Naci\xF3n Sansha. El \xE1rea sirve como puesto avanzado militar, lo que permite\
      \ a sus tropas recargar los sistemas de armas, reparar ciberimplantes personales\
      \ y procesar datos de vigilancia. El complejo tambi\xE9n almacena las crioc\xE1\
      maras de cientos de reservas sanshas.</P>\n<P>Evaluaci\xF3n de amenaza del DED:\
      \ en desarrollo (1 de 10)</P>"
    fr: "<P>Ce complexe Deadspace est occup\xE9 par les soldats de la Sansha's Nation.\
      \ Le secteur sert d'avant-poste militaire, permettant aux troupes de r\xE9approvisionner\
      \ leurs syst\xE8mes d'armement, r\xE9parer les implants cybern\xE9tiques personnels\
      \ et traiter les donn\xE9es de surveillance. Ce complexe accueille aussi des\
      \ chambres cryog\xE9niques abritant des centaines d'unit\xE9s sansha.</P> <P>\xC9\
      valuation de la menace DED\_: formation (1\_sur\_10)</P>"
    ja: "<P>\u3053\u306E\u30C7\u30C3\u30C9\u30B9\u30DA\u30FC\u30B9\u30B3\u30F3\u30D7\
