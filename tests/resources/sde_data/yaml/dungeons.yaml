      \ <P>DED \uC704\uD611\uBD84\uC11D\uBCF4\uACE0\uC11C: \uC8FC\uC758 (2/10) </P>"
    ru: "<P>\u042D\u0442\u043E \u0441\u043A\u043B\u0430\u0434 \u0441\u043D\u0430\u0431\
