    ru: "<P>\u042D\u0442\u043E\u0442 \u043A\u043E\u043C\u043F\u043B\u0435\u043A\u0441\
      \ \u0434\u044D\u0434\u0441\u043F\u0435\u0439\u0441\u0430 \u043E\u043A\u043A\u0443\
