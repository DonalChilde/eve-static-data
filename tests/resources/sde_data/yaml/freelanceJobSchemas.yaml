            es: El tipo de nave cuyo escudo se debe potenciar.
            fr: "Le type de vaisseau dont le bouclier doit \xEAtre boost\xE9."
            ja: "\u30B7\u30FC\u30EB\u30C9\u30D6\u30FC\u30B9\u30C8\u5BFE\u8C61\u3068\
              \u306A\u308B\u8266\u8239\u306E\u30BF\u30A4\u30D7\u3002"
            ko: "\uC2E4\uB4DC \uBD80\uC2A4\uD130\uB97C \uC0AC\uC6A9\uD574\uC57C \uD558\
              \uB294 \uBAA9\uD45C \uD568\uC120\uC785\uB2C8\uB2E4."
            ru: "\u0422\u0438\u043F \u043A\u043E\u0440\u0430\u0431\u043B\u044F, \u0449\
              \u0438\u0442\u044B \u043A\u043E\u0442\u043E\u0440\u043E\u0433\u043E\
              \ \u043D\u0443\u0436\u043D\u043E \u0432\u043E\u0441\u0441\u0442\u0430\
              \u043D\u043E\u0432\u0438\u0442\u044C."
            zh: "\u5FC5\u987B\u8FDB\u884C\u62A4\u76FE\u56DE\u5145\u589E\u91CF\u7684\
