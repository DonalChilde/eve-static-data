              \ c\xE1psula.\n\nPara que los implantes est\xE9n cubiertos, no se deben\
              \ especificar tipos o grupos de naves o el grupo de c\xE1psula debe\
              \ estar incluido en tipos o grupos de naves espec\xEDficos.\n\nSi se\
              \ incluye el grupo de c\xE1psula, se cubrir\xE1n todas las p\xE9rdidas\
              \ de c\xE1psulas, independientemente del tipo de p\xE9rdida de nave\
              \ que sigan."
            fr: "La couverture inclura les implants perdus lorsqu'une capsule est\
              \ d\xE9truite. Pour que les implants soient couverts, aucun type de\
              \ vaisseau ou groupe ne doit \xEAtre sp\xE9cifi\xE9, ou le groupe Capsule\
              \ doit \xEAtre inclus dans les types de vaisseaux ou groupes sp\xE9\
              cifi\xE9s. Si le groupe Capsule est list\xE9, toutes les pertes de capsule\
              \ seront couvertes, quel que soit le type de perte de vaisseau qu'elles\
              \ suivent."
