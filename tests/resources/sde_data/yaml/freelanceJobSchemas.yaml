1:
  BoostShield:
    contentTags:
    - career_path_soldier_of_fortune
    - activity_logistics
    description:
      de: "Verst\xE4rken Sie den Schild eines Kapselpiloten mit Schildfernboostern."
      en: Remote boost a capsuleer's shield.
      es: Impulso remoto al escudo de un capsulista.
      fr: "Rechargez \xE0 distance le bouclier du vaisseau d'un capsulier."
      ja: "\u30AB\u30D7\u30BB\u30E9\u306E\u30B7\u30FC\u30EB\u30C9\u3092\u30EA\u30E2\
        \u30FC\u30C8\u30D6\u30FC\u30B9\u30C8"
      ko: "\uCEA1\uC290\uB9AC\uC5B4\uB97C \uB300\uC0C1\uC73C\uB85C \uC6D0\uACA9 \uC2E4\
        \uB4DC \uBD80\uC2A4\uD130\uB97C \uC0AC\uC6A9\uD569\uB2C8\uB2E4."
      ru: "\u041F\u0440\u043E\u0432\u0435\u0434\u0438\u0442\u0435 \u0434\u0438\u0441\
        \u0442\u0430\u043D\u0446\u0438\u043E\u043D\u043D\u044B\u0439 \u0440\u0435\u043C\
        \u043E\u043D\u0442 \u0449\u0438\u0442\u043E\u0432 \u043A\u043E\u0440\u0430\
        \u0431\u043B\u044F \u0434\u0440\u0443\u0433\u043E\u0433\u043E \u043A\u0430\
        \u043F\u0441\u0443\u043B\u0451\u0440\u0430."
      zh: "\u8FDC\u7A0B\u4E3A\u514B\u9686\u98DE\u884C\u5458\u8FDB\u884C\u62A4\u76FE\
        \u56DE\u5145\u589E\u91CF\u3002"
    iconID: shields
    maxContributionsPerParticipant:
      description:
        de: "H\xF6chstmenge, die ein einzelner Teilnehmer zu diesem Auftrag beitragen\
          \ kann."
        en: Maximum amount a single participant can contribute to this job.
        es: "La cantidad m\xE1xima con la que un solo participante puede contribuir\
          \ a este trabajo."
        fr: "Contribution maximale d'un seul participant \xE0 cette mission."
        ja: "\u3053\u306E\u30B8\u30E7\u30D6\u306E\u53C2\u52A0\u8005\u306E\u500B\u3005\
          \u4EBA\u304C\u8CA2\u732E\u3067\u304D\u308B\u6700\u5927\u984D\u3067\u3059\
          \u3002"
        ko: "\uD574\uB2F9 \uC784\uBB34\uC5D0 \uCC38\uC5EC\uD55C \uCEA1\uC290\uB9AC\
          \uC5B4\uC758 \uCD5C\uB300 \uAE30\uC5EC \uC218\uCE58\uC785\uB2C8\uB2E4."
        ru: "\u041C\u0430\u043A\u0441\u0438\u043C\u0430\u043B\u044C\u043D\u044B\u0439\
          \ \u043E\u0431\u044A\u0451\u043C \u043F\u043E\u043C\u043E\u0449\u0438 \u0434\
          \u043B\u044F \u043E\u0434\u043D\u043E\u0433\u043E \u0438\u0441\u043F\u043E\
          \u043B\u043D\u0438\u0442\u0435\u043B\u044F \u044D\u0442\u043E\u0433\u043E\
          \ \u0437\u0430\u043A\u0430\u0437\u0430."
        zh: "\u6BCF\u4E2A\u53C2\u4E0E\u8005\u53EF\u5BF9\u8BE5\u4EFB\u52A1\u505A\u51FA\
          \u7684\u6700\u5927\u8D21\u732E\u3002"
      iconID: personal
      title:
        de: Limit pro Beitragendem
        en: Limit per Contributor
        es: "L\xEDmite por contribuyente"
        fr: Limite par contributeur
        ja: "\u8CA2\u732E\u8005\u3042\u305F\u308A\u306E\u4E0A\u9650"
        ko: "\uCC38\uC5EC\uC790 \uAE30\uC5EC \uC81C\uD55C"
        ru: "\u041E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D\u0438\u0435 \u0434\
          \u043B\u044F \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A\u0430"
        zh: "\u4E2A\u4EBA\u8D21\u732E\u9650\u5236"
      unsetDescription:
        de: "Beitragsh\xF6he eingeben (Optional)"
        en: Type in contribution amount (Optional)
        es: "Escribe la cantidad de contribuci\xF3n (opcional)"
        fr: Tapez le montant de la contribution (facultatif)
        ja: "\u8CA2\u732E\u91CF\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044\
          \uFF08\u4EFB\u610F\uFF09"
        ko: "\uAE30\uC5EC\uB3C4 \uC785\uB825(\uC120\uD0DD\uC0AC\uD56D)"
        ru: "\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u0440\u0430\u0437\u043C\u0435\
          \u0440 \u0432\u043A\u043B\u0430\u0434\u0430 (\u043D\u0435\u043E\u0431\u044F\
          \u0437\u0430\u0442\u0435\u043B\u044C\u043D\u043E)"
        zh: "\u8F93\u5165\u8D21\u732E\u503C\uFF08\u9009\u586B\uFF09"
    parameters:
      boosted_identity:
        matcher:
          acceptedValueTypes:
          - character
          - corporation
          - alliance
          - faction
          description:
            de: "Entweder der Kapselpilot, der das Schiff besitzt, das per Fernbooster\
              \ verst\xE4rkt wird, oder eine Organisation, der er angeh\xF6rt (Corporation,\
              \ Allianz, Fraktion)."
            en: Either the capsuleer who must own the ship being remote boosted, or
              an organization they must belong to (corporation, alliance, faction).
            es: "O el capsulista que debe ser propietario de la nave que se potencia\
              \ de forma remota, o una organizaci\xF3n a la que debe pertenecer (corporaci\xF3\
              n, alianza, facci\xF3n)."
