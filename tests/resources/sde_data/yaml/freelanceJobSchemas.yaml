      ja: "\u30D6\u30FC\u30B9\u30C8\u3057\u305FHP\u3042\u305F\u308A\u306E\u5831\u916C"
      ko: "\uC99D\uD3ED\uD55C \uB0B4\uAD6C\uB3C4\uB2F9 \uBCF4\uC0C1"
