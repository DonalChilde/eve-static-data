            fr: Saisir le nom
            ja: "\u540D\u524D\u3092\u5165\u529B"
            ko: "\uC774\uB984 \uC785\uB825"
            ru: "\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043D\u0430\u0437\u0432\
              \u0430\u043D\u0438\u0435"
            zh: "\u8F93\u5165\u540D\u79F0"
    progressDescription:
      de: HP wiederhergestellt
      en: HP boosted
      es: PV potenciados
      fr: "PV boost\xE9s"
      ja: "\u30D6\u30FC\u30B9\u30C8\u3057\u305FHP"
      ko: "\uC99D\uD3ED\uD55C \uB0B4\uAD6C\uB3C4"
      ru: "\u041F\u043E\u0432\u044B\u0448\u0435\u043D\u043E \u043F\u0440\u043E\u0447\
        \u043D\u043E\u0441\u0442\u0438"
      zh: "\u5DF2\u589E\u52A0HP"
    rewardDescription:
