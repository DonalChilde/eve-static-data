            es: El sistema solar en el que se debe potenciar el escudo.
            fr: "Le syst\xE8me solaire dans lequel le bouclier doit \xEAtre recharg\xE9\
              ."
            ja: "\u30B7\u30FC\u30EB\u30C9\u30D6\u30FC\u30B9\u30C8\u306E\u5BFE\u8C61\
              \u3068\u306A\u308B\u30BD\u30FC\u30E9\u30FC\u30B7\u30B9\u30C6\u30E0\u3002"
            ko: "\uC2E4\uB4DC \uBD80\uC2A4\uD130 \uC784\uBB34\uB97C \uC9C4\uD589\uD560\
              \ \uC218 \uC788\uB294 \uC131\uACC4\uC785\uB2C8\uB2E4."
            ru: "\u0417\u0432\u0451\u0437\u0434\u043D\u0430\u044F \u0441\u0438\u0441\
              \u0442\u0435\u043C\u0430, \u0432\_\u043A\u043E\u0442\u043E\u0440\u043E\
              \u0439 \u043D\u0443\u0436\u043D\u043E \u0432\u043E\u0441\u0441\u0442\
