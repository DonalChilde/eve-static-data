              \ soit une organisation \xE0 laquelle il doit appartenir (corporation,\
              \ alliance, faction)."
            ja: "\u30EA\u30E2\u30FC\u30C8\u30D6\u30FC\u30B9\u30C8\u3055\u308C\u3066\
              \u3044\u308B\u8266\u8239\u3092\u6240\u6709\u3059\u308B\u30AB\u30D7\u30BB\
              \u30E9\u304B\u3001\u305D\u306E\u30AB\u30D7\u30BB\u30E9\u304C\u6240\u5C5E\
              \u3059\u308B\u7D44\u7E54\uFF08\u30B3\u30FC\u30DD\u30EC\u30FC\u30B7\u30E7\
              \u30F3\u3001\u30A2\u30E9\u30A4\u30A2\u30F3\u30B9\u3001\u52E2\u529B\uFF09\
              \u3002"
            ko: "\uC6D0\uAC70\uB9AC\uC5D0\uC11C \uC2E4\uB4DC \uBD80\uC2A4\uD130\uB97C\
              \ \uBC1B\uC744 \uC218 \uC788\uB294 \uD568\uC120\uC744 \uC18C\uC720\uD55C\
              \ \uCEA1\uC290\uB9AC\uC5B4, \uB610\uB294 \uD574\uB2F9 \uCEA1\uC290\uB9AC\
              \uC5B4\uAC00 \uC18C\uC18D\uB41C \uCF54\uD37C\uB808\uC774\uC158, \uC5BC\
              \uB77C\uC774\uC5B8\uC2A4, \uD329\uC158\uC744 \uD45C\uC2DC\uD569\uB2C8\
              \uB2E4."
            ru: "\u041B\u0438\u0431\u043E \u043F\u0438\u043B\u043E\u0442 \u043A\u043E\
              \u0440\u0430\u0431\u043B\u044F, \u043F\u043E\u0434\u0432\u0435\u0440\
              \u0433\u0448\u0435\u0433\u043E\u0441\u044F \u0434\u0438\u0441\u0442\u0430\
              \u043D\u0446\u0438\u043E\u043D\u043D\u043E\u0439 \u043D\u0430\u043A\u0430\
              \u0447\u043A\u0435 \u0449\u0438\u0442\u043E\u0432, \u043B\u0438\u0431\
              \u043E \u043E\u0431\u044A\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u0435\
              , \u0432 \u043A\u043E\u0442\u043E\u0440\u043E\u043C \u0441\u043E\u0441\
              \u0442\u043E\u0438\u0442 \u044D\u0442\u043E\u0442 \u043A\u0430\u043F\
              \u0441\u0443\u043B\u0451\u0440 (\u043A\u043E\u0440\u043F\u043E\u0440\
              \u0430\u0446\u0438\u044F, \u0430\u043B\u044C\u044F\u043D\u0441, \u0444\
              \u0440\u0430\u043A\u0446\u0438\u044F)."
            zh: "\u53EF\u4EE5\u662F\u5FC5\u987B\u62E5\u6709\u8FDB\u884C\u8FDC\u7A0B\
              \u589E\u91CF\u7684\u8230\u8239\u7684\u514B\u9686\u98DE\u884C\u5458\uFF0C\
              \u4E5F\u53EF\u4EE5\u662F\u4ED6\u4EEC\u5FC5\u5B9A\u5728\u4E3A\u4E4B\u6548\
              \u529B\u7684\u7684\u7EC4\u7EC7\uFF08\u519B\u56E2\u3001\u8054\u76DF\u3001\
              \u52BF\u529B\uFF09\u3002"
          iconID: pilot_or_organization
          maxEntries: 10
          optional: true
          title:
            de: Kapselpiloten oder Organisationen
            en: Capsuleers or Organizations
            es: Capsulistas u organizaciones
            fr: Capsuliers ou organisations
            ja: "\u30AB\u30D7\u30BB\u30E9\u307E\u305F\u306F\u7D44\u7E54"
            ko: "\uCEA1\uC290\uB9AC\uC5B4 \uB610\uB294 \uB2E8\uCCB4"
            ru: "\u041A\u0430\u043F\u0441\u0443\u043B\u0451\u0440\u044B \u0438\u043B\
              \u0438 \u043E\u0440\u0433\u0430\u043D\u0438\u0437\u0430\u0446\u0438\u0438"
            zh: "\u514B\u9686\u98DE\u884C\u5458\u6216\u7EC4\u7EC7"
          type: identity
          unsetDescription:
            de: Namen eingeben
            en: Type in name
            es: Escribe un nombre
            fr: Saisir le nom
            ja: "\u540D\u524D\u3092\u5165\u529B"
            ko: "\uC774\uB984 \uC785\uB825"
            ru: "\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043D\u0430\u0437\u0432\
              \u0430\u043D\u0438\u0435"
            zh: "\u8F93\u5165\u540D\u79F0"
      boosted_ship:
        matcher:
          acceptedValueTypes:
          - ship_type
          - ship_class
          description:
            de: "Der Schiffstyp, dessen Schild per Booster verst\xE4rkt werden muss."
