    contributionMultiplier:
      defaultValue: 1
      description:
        de: "Der Prozentsatz des Wertes des Schiffs plus der verlorenen Ausr\xFCstung,\
          \ der entsch\xE4digt wird. Dadurch kann die Entsch\xE4digung entweder h\xF6\
          her oder niedriger sein als der verlorene Wert. Sie kann zwischen {min_value}\_\
          % und {max_value}\_% des Abschussbericht-Verlustwerts festgelegt werden.\
          \ Der Wert des verlorenen Schiffs und der Ausr\xFCstung wird um diesen Prozentsatz\
          \ angepasst, bevor die Deckungsgrenze pro Verlust und die Deckungsgrenze\
          \ pro Teilnehmer angewendet werden."
        en: 'The percentage of the value of the ship plus fitting lost that will be
          compensated. This allows compensation to be either higher or lower than
          the value lost. It can be set between {min_value}% and {max_value}% of the
          Kill Report loss value.


          The value of the lost ship and fitting is modified by this percentage before
          the Coverage limit per loss and Coverage limit per participant are applied.'
        es: "El porcentaje del valor de la nave y el equipamiento perdido que se compensar\xE1\
          . Esto permite que la compensaci\xF3n sea mayor o menor que el valor perdido.\
          \ Puede establecerse entre el {min_value}\_% y el {max_value}\_% del valor\
          \ de p\xE9rdida del informe de muertes.\n\nEl valor de la nave perdida y\
          \ su equipamiento se modifica en este porcentaje antes de que se apliquen\
          \ el l\xEDmite de cobertura por p\xE9rdida y el l\xEDmite de cobertura por\
          \ participante."
        fr: "Le pourcentage de la valeur du vaisseau et du montage perdu qui sera\
          \ compens\xE9. Cela permet d'obtenir une indemnit\xE9 sup\xE9rieure ou inf\xE9\
          rieure \xE0 la valeur perdue. Elle peut \xEAtre fix\xE9e entre {min_value}\_\
          % et {max_value}\_% de la valeur de perte du rapport de victime. La valeur\
          \ du vaisseau et du montage perdus est modifi\xE9e par ce pourcentage avant\
          \ l'application de la limite de couverture par perte et de la limite de\
          \ couverture par participant."
