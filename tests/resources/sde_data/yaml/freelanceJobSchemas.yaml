          description:
            de: "Die Deckung umfasst Implantate, die verloren gehen, wenn eine Kapsel\
              \ zerst\xF6rt wird. Damit Implantate abgedeckt werden, d\xFCrfen entweder\
              \ keine Schiffstypen oder Gruppen angegeben werden oder die Kapselgruppe\
              \ muss in den angegebenen Schiffstypen oder Gruppen enthalten sein.\
              \ Wenn die Kapselgruppe aufgelistet ist, werden alle Kapselverluste\
              \ abgedeckt, unabh\xE4ngig davon, welcher Art von Schiffsverlust sie\
              \ folgen."
            en: 'Coverage will include implants lost when a capsule is destroyed.


              For implants to be covered either no ship types or groups must be specified
              or the Capsule group must be included in specified ship types or groups.


              If the Capsule group is listed, all Capsule losses will be covered regardless
              of which type of ship loss they follow.'
