      \ du repaire de mercenaires associ\xE9 et r\xE9duire son anarchie."
    ja: "\u5168\u3066\u306E\u30C9\u30EA\u30D5\u30BF\u30FC\u3068\u30B9\u30EA\u30FC\u30D1\
      \u30FC\u3092\u6483\u589C\u3059\u308B\u3053\u3068\u3067\u3001\u95A2\u9023\u3059\
      \u308B\u50AD\u5175\u306E\u96A0\u308C\u5BB6\u306E\u958B\u767A\u5EA6\u304C\u4E0A\
      \u304C\u308A\u3001\u7121\u79E9\u5E8F\u5EA6\u304C\u4E0B\u304C\u308A\u307E\u3059\
      \u3002"
    ko: "\uBAA8\uB4E0 \uB4DC\uB9AC\uD504\uD130\uC640 \uC2AC\uB9AC\uD37C \uD568\uC120\
      \uC744 \uD30C\uAD34\uD574 \uC6A9\uBCD1 \uC18C\uAD74\uC758 \uBC1C\uC804 \uC218\
      \uCE58\uB97C \uB192\uC774\uACE0 \uD63C\uB3C8 \uC218\uCE58\uB97C \uAC10\uC18C\
      \uC2DC\uD0A4\uC138\uC694."
    ru: "\u0423\u043D\u0438\u0447\u0442\u043E\u0436\u044C\u0442\u0435 \u0432\u0441\
      \u0435\u0445 \u0421\u043A\u0438\u0442\u0430\u043B\u044C\u0446\u0435\u0432 \u0438\
      \ \u0421\u043F\u044F\u0449\u0438\u0445, \u0447\u0442\u043E\u0431\u044B \u043F\
      \u043E\u0432\u044B\u0441\u0438\u0442\u044C \u0443\u0440\u043E\u0432\u0435\u043D\
      \u044C \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u044F \u0438 \u0443\u043C\u0435\
      \u043D\u044C\u0448\u0438\u0442\u044C \u043F\u043E\u043A\u0430\u0437\u0430\u0442\
      \u0435\u043B\u044C \u0430\u043D\u0430\u0440\u0445\u0438\u0438 \u0441\u043E\u043E\
      \u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044E\u0449\u0435\u0433\u043E\
      \ \u043B\u043E\u0433\u043E\u0432\u0430 \u043D\u0430\u0451\u043C\u043D\u0438\u043A\
      \u043E\u0432."
    zh: "\u6D88\u706D\u6240\u6709\u6D41\u6D6A\u8005\u548C\u51AC\u7720\u8005\uFF0C\u589E\
      \u52A0\u76F8\u5173\u96C7\u4F63\u5175\u5DE2\u7A74\u7684\u53D1\u5C55\u503C\u5E76\
      \u51CF\u5C11\u5176\u6DF7\u4E71\u503C\u3002"
  development_impact: 10
  infomorph_bonus: 350
  name:
    de: Drifter-Appell
    en: Drifter Muster
    es: Asamblea drifter
    fr: Rassemblement drifter
    ja: "\u30C9\u30EA\u30D5\u30BF\u30FC\u306E\u96C6\u7D50"
    ko: "\uB4DC\uB9AC\uD504\uD130 \uC9D1\uACB0\uC9C0"
    ru: "\u0421\u0431\u043E\u0440 \u0421\u043A\u0438\u0442\u0430\u043B\u044C\u0446\
      \u0435\u0432"
    zh: "\u6D41\u6D6A\u8005\u96C6\u7ED3"
