      \u5F37\u304F\u3001\u6DF7\u6C8C\u3068\u3057\u305F\u72B6\u6CC1\u3084\u71B1\u72C2\
      \u7684\u306A\u6DF7\u4E71\u3092\u3046\u307E\u304F\u4E57\u308A\u8D8A\u3048\u308B\
      \u3053\u3068\u304C\u3067\u304D\u308B\u3002\u305D\u306E\u5834\u305D\u306E\u5834\
      \u3067\u6A5F\u8EE2\u3092\u5229\u304B\u305B\u3001\u30D7\u30EC\u30C3\u30B7\u30E3\
      \u30FC\u306E\u4E2D\u3067\u3082\u51B7\u9759\u3055\u3092\u4FDD\u3064\u5929\u8CE6\
      \u306E\u624D\u80FD\u3092\u6301\u3064\u3053\u3068\u304B\u3089\u3001\u30B9\u30C8\
      \u30EC\u30B9\u306E\u591A\u3044\u7523\u696D\u754C\u3084\u8ECD\u4E8B\u8077\u306B\
      \u5C31\u304F\u3053\u3068\u304C\u591A\u3044\u3002"
    ko: "\uC2DC\uBE44\uB808\uB294 \uBB34\uC5ED\uC5D0\uC11C\uB4E0 \uC804\uD22C\uC5D0\
      \uC11C\uB294 \uC9D1\uC911 \uACF5\uACA9\uC5D0 \uB9E4\uC6B0 \uB2A5\uD569\uB2C8\
      \uB2E4. \uACBD\uC7C1\uC2EC\uC774 \uAC15\uD55C \uD0D3\uC5D0 \uD63C\uB780\uD558\
      \uACE0\uB3C4 \uBD80\uC0B0\uD558\uAE30 \uADF8\uC9C0\uC5C6\uB294 \uD658\uACBD\
      \ \uC18D\uC5D0\uC11C \uB9E4\uC6B0 \uBC88\uC131\uD569\uB2C8\uB2E4. \uC2DC\uBE44\
      \uB808\uB294 \uB54C\uB54C\uB85C \uACE0\uAC15\uB3C4 \uC0B0\uC5C5 \uBC0F \uAD70\
      \uC0AC\uC9C1\uC5D0 \uACE0\uC6A9\uB418\uB294\uB370, \uC0AC\uACE0\uAC00 \uBE60\
      \uB974\uACE0 \uC555\uBC15\uBC1B\uB294 \uC0C1\uD669\uC5D0\uC11C\uB3C4 \uCE68\uCC29\
      \uD568\uC744 \uC720\uC9C0\uD558\uB294 \uB2A5\uB825\uC744 \uD0C0\uACE0\uB0AC\uAE30\
      \ \uB54C\uBB38\uC785\uB2C8\uB2E4."
