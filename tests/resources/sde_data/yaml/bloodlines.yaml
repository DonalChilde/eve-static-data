  description:
    de: "Ob im Kampf oder Handel, die Civire sind Meister der konzentrierten Aggression.\
      \ Als starke Wettk\xE4mpfer sind sie erst in ihrem Element, wenn die Lage un\xFC\
      bersichtlich und hektisch ist. Sie verf\xFCgen \xFCber die angeborene F\xE4\
      higkeit, blitzschnell zu denken und verlieren auch unter gr\xF6\xDFter Anspannung\
      \ niemals die Fassung."
    en: Whether engaged in trade or combat, the Civire are absolute masters of focused
      aggression. Highly competitive individuals, they thrive under chaotic circumstances
      and frenetic activity. They are often employed in highly stressful industrial
      and military professions due to an innate ability to think quickly on their
      feet and remain composed under pressure.
    es: "Ya sea en el comercio o el combate, los civires son maestros del enfrentamiento.\
      \ De esp\xEDritu altamente competitivo, se desenvuelven con soltura en circunstancias\
      \ ca\xF3ticas y fren\xE9ticas. Suelen trabajar en profesiones industriales y\
      \ militares de gran estr\xE9s debido a su agilidad mental innata y a su capacidad\
      \ para mantener la compostura bajo presi\xF3n."
    fr: "Qu'ils soient engag\xE9s dans le commerce ou un combat, les Civire sont les\
      \ ma\xEEtres absolus de l'agression cibl\xE9e. Dot\xE9s d'un esprit de comp\xE9\
      tition surd\xE9velopp\xE9, ils prosp\xE8rent dans le chaos et l'effervescence.\
      \ Ils occupent souvent des postes industriels et militaires particuli\xE8rement\
      \ stressants en raison de leur capacit\xE9 inn\xE9e \xE0 garder les pieds sur\
      \ terre et \xE0 rester calmes sous la pression."
    ja: "\u30B7\u30D0\u30FC\u4EBA\u306F\u3001\u5546\u58F2\u3067\u3042\u308C\u6226\u95D8\
