  corporationID: 1000046
  description:
    de: "Die Sebiestor werden als innovative Denker respektiert und verf\xFCgen \xFC\
      ber ein angeborenes Interesse f\xFCr Technologie. Trotz chronischer Materialknappheit\
      \ war es ihnen im letzten Jahrtausend gelungen, wichtige Pionierarbeit in den\
      \ angewandten Wissenschaften zu leisten. Auch wenn die Umst\xE4nde noch so aussichtslos\
      \ erscheinen, die Sebiestor finden immer eine L\xF6sung. Ihre Ingenieure sind\
      \ davon \xFCberzeugt, aus einem beliebigen Material alles entwickeln zu k\xF6\
      nnen, wonach ihnen gerade der Sinn steht."
    en: Widely respected as some of the cluster's most innovative thinkers, the Sebiestor
      are an ingenious people with a natural fondness for engineering. For the last
      millennium they have pioneered advances in applied sciences, despite laboring
      under chronic material shortages. Masters of deriving solutions from impossible
      circumstances, Sebiestor engineers believe they can build anything, with anything,
      out of anything.
    es: "Los sebiestors son respetados, ya que se encuentran entre los pensadores\
      \ m\xE1s innovadores del c\xFAmulo. Son un pueblo inventivo y amante de la ingenier\xED\
      a por naturaleza. Durante el \xFAltimo milenio, han sido pioneros en el avance\
      \ de las ciencias aplicadas, a pesar de sufrir una escasez cr\xF3nica de materiales.\
      \ Los ingenieros sebiestors son expertos en hallar soluciones en circunstancias\
      \ imposibles, y creen que pueden construir lo que sea con cualquier cosa."
    fr: "G\xE9n\xE9ralement consid\xE9r\xE9s comme les penseurs les plus novateurs\
      \ de la galaxie, les Sebiestor sont un peuple ing\xE9nieux, avec un penchant\
      \ naturel pour l'ing\xE9nierie. Depuis un mill\xE9naire, ils jouent un r\xF4\
      le de pionnier dans le domaine des sciences appliqu\xE9es, en d\xE9pit de p\xE9\
      nuries chroniques de mat\xE9riaux. Ils n'ont pas leur pareil pour trouver des\
      \ solutions \xE0 des probl\xE8mes en apparence inextricables, et les ing\xE9\
      nieurs sebiestor ne se laissent jamais d\xE9courager, persuad\xE9s que rien\
      \ ne leur est impossible."
    ja: "\u30BB\u30D3\u30A8\u30B9\u30BF\u30FC\u306F\u3001\u751F\u6765\u5DE5\u5B66\u6280\
