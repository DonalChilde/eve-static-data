  description:
    de: "F\xFChrungsst\xE4rke hat in der Gesellschaft der Caldari ein Gesicht: das\
      \ der Deteis. Ihr scharfer Verstand und ihre Beredsamkeit haben ihnen hohe Positionen\
      \ beim Milit\xE4r und in der Politik verschafft. Getrieben von der Pr\xE4misse,\
      \ das Wohl der Gemeinschaft stets \xFCber die Bed\xFCrfnisse des Einzelnen zu\
      \ stellen, haben sie es sich zur Aufgabe gemacht, die Integrit\xE4t des Staates\
      \ Caldari zu wahren."
    en: The Deteis are regarded as the face of leadership in Caldari society. Commonly
      possessed of sharp, ordered minds and articulate tongues, they are mostly found
      in positions of authority within military and political spheres. Driven by the
      cultural premise that the good of the whole must come before the needs of the
      individual, they have made the responsibility of upholding the integrity of
      the entire Caldari State their own.
    es: "Los deteis se consideran la personificaci\xF3n del liderazgo en la sociedad\
      \ caldari. Gracias a sus mentes agudas y ordenadas y a su facilidad de palabra,\
      \ ocupan sobre todo cargos de autoridad en las esferas militares y pol\xEDticas.\
      \ Motivados por la premisa cultural de que el bien com\xFAn debe estar por encima\
      \ de las necesidades individuales, han asumido la responsabilidad de mantener\
      \ la integridad del Estado Caldari."
    fr: "Les Deteis sont un symbole d'autorit\xE9 au sein de la soci\xE9t\xE9 caldari.\
      \ Vifs d'esprit et ordonn\xE9s, ces brillants orateurs occupent pour la plupart\
      \ des postes \xE0 responsabilit\xE9 dans les hautes sph\xE8res politiques et\
      \ militaires. Conform\xE9ment au principe qui veut que le bien de la communaut\xE9\
      \ passe avant les besoins individuels, ils se font un devoir de pr\xE9server\
      \ l'int\xE9grit\xE9 de l'ensemble de l'\xC9tat caldari."
    ja: "\u30C7\u30A3\u30C6\u30A3\u30B9\u4EBA\u306F\u3001\u30AB\u30EB\u30C0\u30EA\u793E\
