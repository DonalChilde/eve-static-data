65:
  description:
    de: "Dieses Zertifikat stellt Ihre Kompetenz im Umgang mit gro\xDFen Energiegesch\xFC\
      tzt\xFCrmen dar. Der Inhaber wei\xDF, dass Impulslaser Waffen mit kurzer Reichweite\
      \ und Strahlenlaser Waffen mit langer Reichweite sind, sowie dass beide Kristalle\
      \ als Munition benutzen, die ohne Ladezeit ausgetauscht werden k\xF6nnen. Dieses\
      \ Skill-Set eignet sich gut f\xFCr Kapselpiloten, die sich auf gro\xDFe Amarr-Schiffe\
      \ spezialisieren, die auf Schlachtkreuzern und Schlachtschiffen basieren."
    en: This certificate represents a level of competence in handling large energy
      turrets. The holder has learned that pulse lasers are short-range weapons, beam
      lasers are long range, and that both use crystal ammunition which can be swapped
      with no reload time. This is a good skillset for capsuleers specializing in
      medium to large Amarr vessels based on the Battlecruiser and Battleship hulls.
    es: "Este certificado representa un nivel de competencia en el control de torretas\
      \ de energ\xEDa grandes. El titular ha aprendido que los l\xE1seres de pulsos\
      \ son armas de corto alcance, los l\xE1seres de rayos son armas de largo alcance,\
      \ y que ambos usan munici\xF3n de cristal que se puede intercambiar sin tiempo\
      \ de recarga. Se trata de un buen conjunto de habilidades para capsulistas que\
      \ se especializan en naves amarrianas medianas y grandes basadas en cruceros\
      \ de combate y acorazados."
    fr: "Ce certificat atteste la capacit\xE9 \xE0 utiliser de grandes tourelles \xE0\
      \ \xE9nergie. Son d\xE9tenteur a appris que les lasers \xE0 impulsions sont\
      \ des armes \xE0 courte port\xE9e, que les lasers \xE0 rayons ont une grande\
      \ port\xE9e, et que ces deux armements utilisent des munitions de cristal pouvant\
      \ \xEAtre chang\xE9es sans p\xE9riode de rechargement. Il s'agit d'une bonne\
      \ comp\xE9tence pour les capsuliers sp\xE9cialis\xE9s dans les vaisseaux amarr\
      \ de taille interm\xE9diaire \xE0 grande con\xE7us sur une base de coques de\
      \ croiseur de bataille et de cuirass\xE9."
