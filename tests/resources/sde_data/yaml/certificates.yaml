50:
  description:
    de: "Dieses Zertifikat stellt Ihre Kompetenz im Umgang mit kleinen Energiegesch\xFC\
      tzt\xFCrmen dar. Der Inhaber wei\xDF, dass Impulslaser Waffen mit kurzer Reichweite\
      \ und Strahlenlaser Waffen mit langer Reichweite sind, sowie dass beide Kristalle\
      \ als Munition benutzen, die ohne Ladezeit ausgetauscht werden k\xF6nnen. Dieses\
      \ Skill-Set eignet sich gut f\xFCr Kapselpiloten, die sich auf kleine Amarr-Schiffe\
      \ spezialisieren, die auf Fregatten und Zerst\xF6rern basieren."
    en: This certificate represents a level of competence in handling small energy
      turrets. The holder has learned that pulse lasers are short range weapons, beam
      lasers are long range, and both use crystal ammunition which can be swapped
      with no reload time. This is a good skillset for capsuleers specializing in
      small Amarr vessels based on Frigate and Destroyer hulls.
    es: "Este certificado representa un nivel de competencia en el control de torretas\
      \ de energ\xEDa peque\xF1as. El titular ha aprendido que los l\xE1seres de pulsos\
      \ son armas de corto alcance, los l\xE1seres de rayos son armas de largo alcance,\
      \ y que ambos usan munici\xF3n de cristal que se puede intercambiar sin tiempo\
      \ de recarga. Se trata de un buen conjunto de habilidades para capsulistas que\
      \ se especializan en naves amarrianas peque\xF1as basadas en fragatas y destructores."
    fr: "Ce certificat atteste la capacit\xE9 \xE0 utiliser des petites tourelles\
      \ \xE0 \xE9nergie. Son d\xE9tenteur a appris que les lasers \xE0 impulsions\
      \ sont des armes \xE0 courte port\xE9e, que les lasers \xE0 rayons ont une grande\
      \ port\xE9e, et que ces deux armements utilisent des munitions de cristal pouvant\
      \ \xEAtre chang\xE9es sans p\xE9riode de rechargement. Il s'agit d'une bonne\
      \ comp\xE9tence pour les capsuliers sp\xE9cialis\xE9s dans les petits vaisseaux\
      \ amarr con\xE7us sur une base de coques de fr\xE9gate et de destroyer."
    ja: "\u3053\u306E\u8A3C\u660E\u66F8\u306F\u3001\u5C0F\u578B\u30A8\u30CD\u30EB\u30AE\
      \u30FC\u30BF\u30EC\u30C3\u30C8\u306E\u4F7F\u7528\u306B\u304A\u3051\u308B\u80FD\
      \u529B\u30EC\u30D9\u30EB\u3092\u793A\u3059\u3002\u6301\u3061\u4E3B\u306F\u3001\
      \u30D1\u30EB\u30B9\u30EC\u30FC\u30B6\u30FC\u306F\u8FD1\u8DDD\u96E2\u7528\u5175\
      \u5668\u3067\u3042\u308A\u3001\u30D3\u30FC\u30E0\u30EC\u30FC\u30B6\u30FC\u306F\
      \u9577\u8DDD\u96E2\u7528\u3067\u3042\u308B\u3053\u3068\u3092\u77E5\u3063\u3066\
      \u3044\u308B\u3002\u307E\u305F\u3001\u3069\u3061\u3089\u3082\u30EA\u30ED\u30FC\
      \u30C9\u6642\u9593\u306A\u3057\u306B\u4EA4\u63DB\u3067\u304D\u308B\u30AF\u30EA\
      \u30B9\u30BF\u30EB\u5F3E\u3092\u4F7F\u7528\u3059\u308B\u3053\u3068\u3092\u77E5\
      \u3063\u3066\u3044\u308B\u3002\u5DE1\u6D0B\u8266\u304A\u3088\u3073\u99C6\u9010\
      \u8266\u7D1A\u306E\u8239\u4F53\u3092\u3079\u30FC\u30B9\u306B\u3057\u305F\u30A2\
      \u30DE\u30FC\u5C0F\u578B\u8239\u306B\u7279\u5316\u3057\u305F\u3044\u30AB\u30D7\
      \u30BB\u30E9\u306B\u6709\u7528\u306A\u30B9\u30AD\u30EB\u30BB\u30C3\u30C8\u3067\
      \u3042\u308B\u3002"
    ko: "\uCEA1\uC290\uB9AC\uC5B4\uAC00 \uC6B0\uC218\uD55C \uC18C\uD615 \uC5D0\uB108\
      \uC9C0 \uD130\uB81B \uC6B4\uC6A9 \uB2A5\uB825\uC744 \uC9C0\uB2C8\uACE0 \uC788\
      \uC74C\uC744 \uC778\uC99D\uD569\uB2C8\uB2E4. \uB2E8\uAC70\uB9AC \uBB34\uAE30\
      \uC778 \uD384\uC2A4 \uB808\uC774\uC800\uC640 \uC911\uAC70\uB9AC \uBB34\uAE30\
      \uC778 \uBE54 \uB808\uC774\uC800\uB294 \uBAA8\uB450 \uC989\uC2DC \uC7A5\uC804\
      \ \uAC00\uB2A5\uD55C \uD06C\uB9AC\uC2A4\uD0C8 \uCC28\uC9C0\uB97C \uC0AC\uC6A9\
      \uD55C\uB2E4\uB294 \uC0AC\uC2E4\uC744 \uC2A4\uD0AC\uC138\uD2B8\uB97C \uD1B5\uD574\
      \ \uC2B5\uB4DD\uD588\uC2B5\uB2C8\uB2E4. \uC544\uB9C8\uB974\uC758 \uD504\uB9AC\
      \uAE43, \uB514\uC2A4\uD2B8\uB85C\uC774\uC5B4\uB97C \uC6B4\uC6A9\uD558\uB294\
      \ \uCEA1\uC290\uB9AC\uC5B4\uC5D0\uAC8C \uC720\uC6A9\uD569\uB2C8\uB2E4."
    ru: "\u0414\u0430\u043D\u043D\u044B\u0439 \u0441\u0435\u0440\u0442\u0438\u0444\
      \u0438\u043A\u0430\u0442 \u0441\u043E\u043E\u0442\u0432\u0435\u0442\u0441\u0442\
      \u0432\u0443\u0435\u0442 \u043E\u0434\u043D\u043E\u043C\u0443 \u0438\u0437 \u0443\
      \u0440\u043E\u0432\u043D\u0435\u0439 \u043F\u043E\u0434\u0433\u043E\u0442\u043E\
      \u0432\u043A\u0438 \u043F\u0438\u043B\u043E\u0442\u0430 \u0432 \u0434\u0435\u043B\
      \u0435 \u0431\u043E\u0435\u0432\u043E\u0433\u043E \u043F\u0440\u0438\u043C\u0435\
      \u043D\u0435\u043D\u0438\u044F \u043B\u0430\u0437\u0435\u0440\u043D\u044B\u0445\
      \ \u043E\u0440\u0443\u0434\u0438\u0439 \u043C\u0430\u043B\u043E\u0439 \u043C\
      \u043E\u0449\u043D\u043E\u0441\u0442\u0438. C\u0435\u0440\u0442\u0438\u0444\u0438\
      \u043A\u0430\u0442 \u0432\u044B\u0434\u0430\u0451\u0442\u0441\u044F \u043F\u0438\
      \u043B\u043E\u0442\u0430\u043C, \u043F\u043E\u0434\u0442\u0432\u0435\u0440\u0434\
      \u0438\u0432\u0448\u0438\u043C \u0441\u0432\u043E\u0451 \u0437\u043D\u0430\u043A\
      \u043E\u043C\u0441\u0442\u0432\u043E \u0441 \u0422\u0422\u0425 \u043B\u0430\u0437\
      \u0435\u0440\u043D\u044B\u0445 \u043E\u0440\u0443\u0434\u0438\u0439 \u0440\u0430\
      \u0437\u043B\u0438\u0447\u043D\u044B\u0445 \u0442\u0438\u043F\u043E\u0432: \u0438\
      \u043C\u043F\u0443\u043B\u044C\u0441\u043D\u044B\u0435 \u043B\u0430\u0437\u0435\
      \u0440\u044B \u044F\u0432\u043B\u044F\u044E\u0442\u0441\u044F \u043E\u0440\u0443\
      \u0436\u0438\u0435\u043C \u0431\u043B\u0438\u0436\u043D\u0435\u0433\u043E \u0431\
      \u043E\u044F, \u0430 \u043B\u0430\u0437\u0435\u0440\u044B \u043D\u0435\u043F\
      \u0440\u0435\u0440\u044B\u0432\u043D\u043E\u0433\u043E \u0434\u0435\u0439\u0441\
      \u0442\u0432\u0438\u044F \u2014 \u043E\u0440\u0443\u0436\u0438\u0435\u043C \u0434\
      \u0430\u043B\u044C\u043D\u0435\u0433\u043E \u0431\u043E\u044F. \xAB\u0411\u043E\
      \u0435\u043F\u0440\u0438\u043F\u0430\u0441\u0430\u043C\u0438\xBB \u0434\u043B\
      \u044F \u043E\u0440\u0443\u0434\u0438\u0439 \u043E\u0431\u043E\u0438\u0445 \u0442\
      \u0438\u043F\u043E\u0432 \u0441\u043B\u0443\u0436\u0430\u0442 \u043B\u0430\u0437\
      \u0435\u0440\u043D\u044B\u0435 \u043A\u0440\u0438\u0441\u0442\u0430\u043B\u043B\
      \u044B, \u0437\u0430\u043C\u0435\u043D\u0430 \u043A\u043E\u0442\u043E\u0440\u044B\
      \u0445 (\u0432 \u0442\u043E\u043C \u0447\u0438\u0441\u043B\u0435 \u0434\u043B\
      \u044F \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u0438\u044F \u0434\u043B\u0438\
      \u043D\u044B \u0432\u043E\u043B\u043D\u044B \u043B\u0430\u0437\u0435\u0440\u0430\
      ) \u043E\u0441\u0443\u0449\u0435\u0441\u0442\u0432\u043B\u044F\u0435\u0442\u0441\
      \u044F \u043C\u0433\u043D\u043E\u0432\u0435\u043D\u043D\u043E. \u041E\u0441\u0432\
      \u043E\u0435\u043D\u0438\u0435 \u044D\u0442\u043E\u0433\u043E \u043D\u0430\u0431\
      \u043E\u0440\u0430 \u043D\u0430\u0432\u044B\u043A\u043E\u0432 \u0440\u0435\u043A\
      \u043E\u043C\u0435\u043D\u0434\u043E\u0432\u0430\u043D\u043E \u043F\u0438\u043B\
      \u043E\u0442\u0430\u043C \u0430\u043C\u0430\u0440\u0440\u0441\u043A\u0438\u0445\
      \ \u0444\u0440\u0435\u0433\u0430\u0442\u043E\u0432 \u0438 \u044D\u0441\u043C\
      \u0438\u043D\u0446\u0435\u0432, \u0430 \u0442\u0430\u043A\u0436\u0435 \u043A\
      \u043E\u0440\u0430\u0431\u043B\u0435\u0439 \u043F\u0440\u043E\u0438\u0437\u0432\
      \u043E\u0434\u043D\u044B\u0445 \u043F\u0440\u043E\u0435\u043A\u0442\u043E\u0432\
      ."
    zh: "\u8BE5\u8BC1\u4E66\u8868\u660E\u6301\u6709\u8005\u5DF2\u7ECF\u638C\u63E1\u4E86\
